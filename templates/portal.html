<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Equb — Member Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            equb: { green: '#078930', gold: '#FCDD09', red: '#DA121A' }
          },
          boxShadow: {
            card: '0 2px 12px rgba(0,0,0,0.07)'
          }
        }
      }
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    body { background: #f3f6f4; }

    .flag-strip {
      height: 4px;
      background: linear-gradient(to right, #078930 33.33%, #FCDD09 33.33% 66.66%, #DA121A 66.66%);
    }

    .status-paid    { background:#dcfce7; color:#15803d; border: 1px solid #bbf7d0; }
    .status-pending { background:#fef9c3; color:#854d0e; border: 1px solid #fde68a; }
    .status-late    { background:#ffedd5; color:#c2410c; border: 1px solid #fed7aa; }
    .status-missed  { background:#fee2e2; color:#b91c1c; border: 1px solid #fecaca; }

    .week-circle {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.75rem; flex-shrink: 0;
    }
    .week-paid    { background:#dcfce7; color:#15803d; }
    .week-missed  { background:#fee2e2; color:#b91c1c; }
    .week-late    { background:#ffedd5; color:#c2410c; }
    .week-pending { background:#f1f5f9; color:#64748b; }
    .week-future  { background:#f1f5f9; color:#94a3b8; }

    .stat-card { transition: transform 0.15s; }
    .stat-card:hover { transform: translateY(-1px); }

    .btn-green {
      background: #078930;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-green:hover:not(:disabled) { background: #056824; transform: translateY(-1px); }
    .btn-green:active:not(:disabled) { transform: translateY(0); }

    .phone-input-wrap {
      position: relative;
    }
    .phone-input-wrap .phone-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: #6b7280; pointer-events: none;
    }
    .phone-input-wrap input {
      padding-left: 42px;
    }

    .pot-win-card {
      background: linear-gradient(135deg, #064e20 0%, #078930 100%);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-in { animation: fadeIn 0.35s ease-out; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; }
  </style>
</head>
<body class="min-h-screen font-sans" x-data="portal()" x-init="init()">

  <!-- Ethiopian flag strip -->
  <div class="flag-strip"></div>

  <!-- Header -->
  <header class="bg-[#078930] text-white shadow-md">
    <div class="max-w-lg mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <!-- Logo mark -->
        <div class="w-10 h-10 rounded-xl flex items-center justify-center text-lg font-black flex-shrink-0"
             style="background:linear-gradient(135deg,rgba(255,255,255,0.15),rgba(255,255,255,0.05)); border:1.5px solid rgba(255,255,255,0.25)">
          እ
        </div>
        <div>
          <div class="font-bold text-base leading-tight tracking-tight">My Equb</div>
          <div class="text-[#FCDD09] text-xs font-medium tracking-wide">Member Self-Service Portal</div>
        </div>
      </div>

      <!-- Sign out (only when logged in) -->
      <button x-show="member" @click="signOut()" x-cloak
              class="flex items-center gap-1.5 text-xs text-white/70 hover:text-white bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-lg transition">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Sign out
      </button>
    </div>
  </header>

  <main class="max-w-lg mx-auto px-4 py-6">

    <!-- ── Login card ── -->
    <div x-show="!member" class="animate-in">
      <div class="bg-white rounded-3xl shadow-card border border-gray-100 overflow-hidden">
        <!-- Card top accent -->
        <div class="h-1.5" style="background:linear-gradient(to right,#078930,#45a049)"></div>

        <div class="p-7 space-y-6">
          <!-- Icon + title -->
          <div class="text-center space-y-2">
            <div class="w-14 h-14 rounded-2xl bg-equb-green/10 flex items-center justify-center mx-auto">
              <svg class="w-7 h-7 text-equb-green" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                      d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
            </div>
            <div class="text-2xl font-bold text-gray-900">Welcome Back</div>
            <div class="text-sm text-gray-500 leading-relaxed">
              Enter your phone number to view your<br/>payment status and schedule.
            </div>
          </div>

          <!-- Phone input -->
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-2 tracking-wide uppercase">
              Phone Number
            </label>
            <div class="phone-input-wrap">
              <span class="phone-icon">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                </svg>
              </span>
              <input x-model="phone" @keydown.enter="lookup()" type="tel"
                     placeholder="09… or +251…"
                     class="w-full py-3 pr-4 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-equb-green/30 focus:border-equb-green transition"
                     :disabled="loading"/>
            </div>
          </div>

          <!-- Error -->
          <div x-show="error" x-cloak
               class="flex items-start gap-2.5 bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl px-4 py-3">
            <svg class="w-4 h-4 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
            </svg>
            <span x-text="error"></span>
          </div>

          <!-- Button -->
          <button @click="lookup()" :disabled="loading || !phone.trim()"
                  class="btn-green w-full text-white py-3.5 rounded-xl font-semibold text-sm disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
            <span x-show="loading" class="spinner inline-block w-4 h-4 border-2 border-white/30 border-t-white rounded-full"></span>
            <span x-text="loading ? 'Looking up…' : 'View My Status'"></span>
          </button>

          <!-- Privacy note -->
          <p class="text-center text-xs text-gray-400 flex items-center justify-center gap-1.5">
            <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
            </svg>
            Your data is private — only you can view this
          </p>
        </div>
      </div>
    </div>

    <!-- ── Member dashboard ── -->
    <template x-if="member">
      <div class="space-y-4 animate-in" x-cloak>

        <!-- Profile card -->
        <div class="bg-white rounded-2xl shadow-card border border-gray-100 p-5">
          <div class="flex items-center gap-4">
            <!-- Avatar -->
            <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-white text-2xl font-bold flex-shrink-0"
                 style="background:linear-gradient(135deg,#078930,#2ecc71)"
                 x-text="member.member_name.charAt(0)"></div>

            <div class="flex-1 min-w-0">
              <div class="font-bold text-gray-900 text-lg leading-tight" x-text="member.member_name"></div>
              <div class="text-xs text-gray-400 mt-0.5" x-text="member.cycle_name ? member.cycle_name : 'No active cycle'"></div>

              <!-- Spot badges -->
              <div class="flex flex-wrap gap-1 mt-2">
                <template x-for="s in member.spots" :key="s.number">
                  <span class="inline-flex items-center gap-0.5 px-2.5 py-0.5 bg-equb-green/10 text-equb-green rounded-full text-xs font-bold border border-equb-green/20">
                    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                      <path d="M10 2a8 8 0 100 16A8 8 0 0010 2zm0 14a6 6 0 110-12 6 6 0 010 12zm0-9a1 1 0 00-1 1v3a1 1 0 001 1h2a1 1 0 000-2h-1V8a1 1 0 00-1-1z"/>
                    </svg>
                    #<span x-text="s.number"></span>
                    <span x-show="s.share==='half'" class="text-gray-400 font-normal">½</span>
                  </span>
                </template>
                <!-- Status badge -->
                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold"
                      :class="member.summary.outstanding_count > 0
                        ? 'bg-red-100 text-red-700 border border-red-200'
                        : 'bg-green-100 text-green-700 border border-green-200'">
                  <span x-text="member.summary.outstanding_count > 0 ? 'Has overdue' : 'In good standing'"></span>
                </span>
              </div>
            </div>
          </div>
        </div>

        <!-- Summary stat cards -->
        <div class="grid grid-cols-3 gap-3">
          <!-- Paid weeks -->
          <div class="stat-card bg-white rounded-2xl border border-gray-100 shadow-card p-4 text-center">
            <div class="text-3xl font-black text-equb-green" x-text="member.summary.paid_weeks"></div>
            <div class="text-xs text-gray-400 mt-1 font-medium">Weeks Paid</div>
            <div class="w-6 h-0.5 bg-equb-green/30 rounded mx-auto mt-2"></div>
          </div>

          <!-- Overdue -->
          <div class="stat-card rounded-2xl border shadow-card p-4 text-center"
               :class="member.summary.outstanding_count > 0
                 ? 'bg-red-50 border-red-200'
                 : 'bg-white border-gray-100'">
            <div class="text-3xl font-black"
                 :class="member.summary.outstanding_count > 0 ? 'text-red-600' : 'text-gray-200'"
                 x-text="member.summary.outstanding_count"></div>
            <div class="text-xs mt-1 font-medium"
                 :class="member.summary.outstanding_count > 0 ? 'text-red-500' : 'text-gray-400'">Overdue</div>
            <div class="w-6 h-0.5 rounded mx-auto mt-2"
                 :class="member.summary.outstanding_count > 0 ? 'bg-red-300' : 'bg-gray-200'"></div>
          </div>

          <!-- Total paid -->
          <div class="stat-card bg-white rounded-2xl border border-gray-100 shadow-card p-4 text-center">
            <div class="text-xl font-black text-orange-500 leading-tight" x-text="fmtShort(member.summary.total_paid_amount)"></div>
            <div class="text-xs text-gray-400 mt-1 font-medium">Total Paid</div>
            <div class="w-6 h-0.5 bg-orange-200 rounded mx-auto mt-2"></div>
          </div>
        </div>

        <!-- Overdue alert -->
        <div x-show="member.summary.outstanding_count > 0"
             class="bg-red-50 border border-red-200 rounded-2xl p-4">
          <div class="flex items-start gap-3">
            <div class="w-9 h-9 rounded-xl bg-red-100 flex items-center justify-center flex-shrink-0">
              <svg class="w-5 h-5 text-red-600" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
              </svg>
            </div>
            <div>
              <div class="font-bold text-red-800 text-sm">Overdue Payments</div>
              <div class="text-sm text-red-700 mt-0.5">
                <span x-text="member.summary.outstanding_count"></span> week(s) totaling
                <strong x-text="fmt(member.summary.outstanding_amount)"></strong> are past due.
                Please contact your group admin to settle.
              </div>
            </div>
          </div>
        </div>

        <!-- Pot wins -->
        <div x-show="member.wins.length > 0" class="bg-white rounded-2xl shadow-card border border-gray-100 overflow-hidden">
          <div class="pot-win-card px-5 py-4">
            <div class="flex items-center gap-2">
              <svg class="w-5 h-5 text-yellow-300" fill="currentColor" viewBox="0 0 20 20">
                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
              </svg>
              <div class="font-bold text-white">Your Pot Win(s)</div>
            </div>
          </div>
          <div class="divide-y divide-gray-50">
            <template x-for="w in member.wins" :key="w.week_number">
              <div class="px-5 py-4 flex items-center gap-4">
                <div class="week-circle week-paid">W<span x-text="w.week_number"></span></div>
                <div class="flex-1 min-w-0">
                  <div class="font-semibold text-sm text-gray-900">Week <span x-text="w.week_number"></span></div>
                  <div class="text-xs text-gray-400" x-text="fmtDate(w.draw_date)"></div>
                </div>
                <div>
                  <div class="font-black text-equb-green text-base" x-text="fmtShort(w.buyer_receives)"></div>
                  <div class="text-xs text-gray-400 text-right" x-text="fmt(w.buyer_receives)"></div>
                </div>
              </div>
            </template>
          </div>
        </div>

        <!-- Upcoming draws -->
        <div x-show="member.upcoming.length > 0" class="bg-white rounded-2xl shadow-card border border-gray-100 overflow-hidden">
          <div class="px-5 py-3.5 border-b border-gray-100 flex items-center gap-2">
            <svg class="w-4.5 h-4.5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            <div class="font-semibold text-gray-800 text-sm">Upcoming Draws</div>
          </div>
          <div class="divide-y divide-gray-50">
            <template x-for="w in member.upcoming" :key="w.week_number">
              <div class="px-5 py-4 flex items-center gap-4">
                <div class="week-circle week-future">W<span x-text="w.week_number"></span></div>
                <div class="flex-1">
                  <div class="font-semibold text-sm text-gray-900 flex items-center gap-1.5">
                    Week <span x-text="w.week_number"></span>
                    <span x-show="w.is_group_week"
                          class="text-purple-600 bg-purple-50 text-xs px-1.5 py-0.5 rounded-full border border-purple-200">Group</span>
                  </div>
                  <div class="text-xs text-gray-400" x-text="fmtDate(w.draw_date)"></div>
                </div>
                <span class="text-xs font-semibold text-blue-600 bg-blue-50 px-2.5 py-1 rounded-full border border-blue-100">Upcoming</span>
              </div>
            </template>
          </div>
        </div>

        <!-- Payment history -->
        <div class="bg-white rounded-2xl shadow-card border border-gray-100 overflow-hidden">
          <div class="px-5 py-3.5 border-b border-gray-100 flex items-center justify-between">
            <div class="flex items-center gap-2">
              <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
              </svg>
              <div class="font-semibold text-gray-800 text-sm">Payment History</div>
            </div>
            <div class="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded-full"
                 x-text="member.payments.length + ' weeks'"></div>
          </div>

          <div class="divide-y divide-gray-50 max-h-[480px] overflow-y-auto">
            <template x-for="p in member.payments.slice().reverse()" :key="p.week_number">
              <div class="px-5 py-3.5 flex items-center gap-4"
                   :class="!p.is_past && p.status==='pending' ? 'opacity-40' : ''">

                <!-- Week circle -->
                <div class="week-circle flex-shrink-0"
                     :class="{
                       'week-paid':    p.status === 'paid',
                       'week-missed':  p.status === 'missed',
                       'week-late':    p.status === 'late',
                       'week-pending': p.status === 'pending' && p.is_past,
                       'week-future':  p.status === 'pending' && !p.is_past
                     }">
                  <span x-text="p.week_number"></span>
                </div>

                <div class="flex-1 min-w-0">
                  <div class="font-semibold text-sm text-gray-900">Week <span x-text="p.week_number"></span></div>
                  <div class="text-xs text-gray-400" x-text="fmtDate(p.draw_date)"></div>
                  <div x-show="p.paid_date" class="text-xs text-gray-400 mt-0.5">
                    Paid <span x-text="fmtDate(p.paid_date)"></span>
                    <span x-show="p.payment_method" x-text="' · ' + p.payment_method"></span>
                  </div>
                </div>

                <div class="flex flex-col items-end gap-1.5 flex-shrink-0">
                  <span class="text-sm font-bold text-gray-800" x-text="fmt(p.amount)"></span>
                  <span class="text-xs font-semibold px-2 py-0.5 rounded-full"
                        :class="'status-' + p.status"
                        x-text="p.status.charAt(0).toUpperCase() + p.status.slice(1)"></span>
                </div>
              </div>
            </template>

            <div x-show="!member.payments.length"
                 class="px-5 py-10 text-center text-sm text-gray-400 flex flex-col items-center gap-2">
              <svg class="w-8 h-8 text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                      d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
              </svg>
              No payment records in the active cycle.
            </div>
          </div>
        </div>

      </div>
    </template>

  </main>

  <!-- Footer -->
  <footer class="mt-8 pb-8 text-center">
    <div class="text-xs text-gray-400 mb-3">Equb Management System &mdash; Member Portal</div>
    <div class="w-20 mx-auto h-1 rounded-full overflow-hidden"
         style="background:linear-gradient(to right,#078930 33.33%,#FCDD09 33.33% 66.66%,#DA121A 66.66%)"></div>
  </footer>

<script>
function portal() {
  return {
    phone: '',
    loading: false,
    error: '',
    member: null,

    async init() {},

    signOut() {
      this.member = null;
      this.phone = '';
      this.error = '';
    },

    async lookup() {
      const p = this.phone.trim();
      if (!p) return;
      this.loading = true;
      this.error = '';
      this.member = null;
      try {
        const res = await fetch('/api/portal/lookup?phone=' + encodeURIComponent(p));
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          this.error = body.detail || 'No member found with this phone number.';
          return;
        }
        this.member = await res.json();
      } catch(e) {
        this.error = 'Network error — please try again.';
      } finally {
        this.loading = false;
      }
    },

    fmt(n) {
      if (n == null) return '—';
      return Number(n).toLocaleString('en-ET', { minimumFractionDigits: 0, maximumFractionDigits: 0 }) + ' ETB';
    },

    fmtShort(n) {
      if (n == null) return '—';
      const v = Number(n);
      if (v >= 1_000_000) return (v / 1_000_000).toFixed(v % 1_000_000 === 0 ? 0 : 1) + 'M ETB';
      if (v >= 1_000)     return (v / 1_000).toFixed(v % 1_000 === 0 ? 0 : 1) + 'K ETB';
      return v.toLocaleString('en-ET') + ' ETB';
    },

    fmtDate(d) {
      if (!d) return '—';
      try {
        return new Date(d).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
      } catch { return d; }
    },

    // legacy alias kept for template compatibility
    fmt_date(d) { return this.fmtDate(d); },
  };
}
</script>
</body>
</html>

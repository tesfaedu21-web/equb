<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Equb — Member Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { equb: { green: '#078930', gold: '#FCDD09', red: '#DA121A' } }
        }
      }
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    body { background: #f3f6f4; }

    .flag-strip { height: 4px; background: linear-gradient(to right, #078930 33.33%, #FCDD09 33.33% 66.66%, #DA121A 66.66%); }

    .status-paid    { background:#dcfce7; color:#15803d; border:1px solid #bbf7d0; }
    .status-pending { background:#fef9c3; color:#854d0e; border:1px solid #fde68a; }
    .status-late    { background:#ffedd5; color:#c2410c; border:1px solid #fed7aa; }
    .status-missed  { background:#fee2e2; color:#b91c1c; border:1px solid #fecaca; }

    .week-circle { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.75rem; flex-shrink:0; }
    .week-paid    { background:#dcfce7; color:#15803d; }
    .week-missed  { background:#fee2e2; color:#b91c1c; }
    .week-late    { background:#ffedd5; color:#c2410c; }
    .week-pending { background:#f1f5f9; color:#64748b; }
    .week-future  { background:#f1f5f9; color:#94a3b8; }

    .btn-green { background:#078930; transition:background .2s,transform .1s; }
    .btn-green:hover:not(:disabled) { background:#056824; transform:translateY(-1px); }
    .btn-green:active:not(:disabled) { transform:translateY(0); }

    .phone-input-wrap { position:relative; }
    .phone-input-wrap .phone-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:#6b7280; pointer-events:none; }
    .phone-input-wrap input { padding-left:42px; }

    .pot-win-card { background:linear-gradient(135deg,#064e20 0%,#078930 100%); }
    .pot-week-card { background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 100%); }

    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .animate-in { animation:fadeIn .35s ease-out; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .spinner { animation:spin .8s linear infinite; }

    .lang-btn { font-size:.7rem; font-weight:700; padding:3px 8px; border-radius:6px; cursor:pointer; transition:all .15s; }
    .lang-btn.active { background:rgba(255,255,255,.25); color:#fff; }
    .lang-btn.inactive { background:rgba(255,255,255,.08); color:rgba(255,255,255,.55); }
  </style>
</head>
<body class="min-h-screen font-sans" x-data="portal()" x-init="init()">

  <div class="flag-strip"></div>

  <!-- Header -->
  <header class="bg-[#078930] text-white shadow-md">
    <div class="max-w-lg mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl flex items-center justify-center text-lg font-black flex-shrink-0"
             style="background:linear-gradient(135deg,rgba(255,255,255,.15),rgba(255,255,255,.05));border:1.5px solid rgba(255,255,255,.25)">
          እ
        </div>
        <div>
          <div class="font-bold text-base leading-tight">My Equb</div>
          <div class="text-[#FCDD09] text-xs font-medium" x-text="t('Member Self-Service Portal','የአባልት የግል ፖርታል')"></div>
        </div>
      </div>

      <div class="flex items-center gap-2">
        <!-- Language toggle -->
        <div class="flex gap-1">
          <button @click="lang='en'" :class="lang==='en' ? 'active' : 'inactive'" class="lang-btn">EN</button>
          <button @click="lang='am'" :class="lang==='am' ? 'active' : 'inactive'" class="lang-btn">አማ</button>
        </div>
        <!-- Sign out -->
        <button x-show="member" @click="signOut()" x-cloak
                class="flex items-center gap-1 text-xs text-white/70 hover:text-white bg-white/10 hover:bg-white/20 px-2.5 py-1.5 rounded-lg transition">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
          <span x-text="t('Sign out','ውጣ')"></span>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-lg mx-auto px-4 py-6">

    <!-- ── Login card ── -->
    <div x-show="!member" class="animate-in">
      <div class="bg-white rounded-3xl shadow border border-gray-100 overflow-hidden">
        <div class="h-1.5" style="background:linear-gradient(to right,#078930,#45a049)"></div>
        <div class="p-7 space-y-5">
          <div class="text-center space-y-2">
            <div class="w-14 h-14 rounded-2xl bg-equb-green/10 flex items-center justify-center mx-auto">
              <svg class="w-7 h-7 text-equb-green" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                      d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
            </div>
            <div class="text-2xl font-bold text-gray-900" x-text="t('Welcome Back','እንኳን ደህና መጡ')"></div>
            <div class="text-sm text-gray-500 leading-relaxed"
                 x-text="t('Enter your phone number and spot number to view your payment status and schedule.',
                            'ሁኔታዎን ለማየት ስልክ ቁጥርዎን እና ዕጣ ቁጥርዎን ያስገቡ።')"></div>
          </div>

          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-2 uppercase tracking-wide"
                   x-text="t('Phone Number','ስልክ ቁጥር')"></label>
            <div class="phone-input-wrap">
              <span class="phone-icon">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                </svg>
              </span>
              <input x-model="phone" type="tel" :placeholder="t('09… or +251…','09… ወይም +251…')"
                     class="w-full py-3 pr-4 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-equb-green/30 focus:border-equb-green transition"
                     :disabled="loading"/>
            </div>
          </div>

          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-2 uppercase tracking-wide"
                   x-text="t('Spot Number','ዕጣ ቁጥር')"></label>
            <div class="relative">
              <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-sm font-bold text-gray-400 pointer-events-none">#</span>
              <input x-model="spotNumber" @keydown.enter="lookup()" type="number" min="1"
                     :placeholder="t('e.g. 5','ለምሳሌ 5')"
                     class="w-full py-3 pl-8 pr-4 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-equb-green/30 focus:border-equb-green transition"
                     :disabled="loading"/>
            </div>
          </div>

          <div x-show="error" x-cloak
               class="flex items-start gap-2.5 bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl px-4 py-3">
            <svg class="w-4 h-4 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
            </svg>
            <span x-text="error"></span>
          </div>

          <button @click="lookup()" :disabled="loading || !phone.trim() || !spotNumber"
                  class="btn-green w-full text-white py-3.5 rounded-xl font-semibold text-sm disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
            <span x-show="loading" class="spinner inline-block w-4 h-4 border-2 border-white/30 border-t-white rounded-full"></span>
            <span x-text="loading ? t('Looking up…','በመፈለግ ላይ…') : t('View My Status','ሁኔታዬን እይ')"></span>
          </button>

          <p class="text-center text-xs text-gray-400 flex items-center justify-center gap-1.5">
            <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
            </svg>
            <span x-text="t('Your data is private — only you can view this','ሁኔታዎ የግል ነው')"></span>
          </p>
        </div>
      </div>
    </div>

    <!-- ── Dashboard ── -->
    <template x-if="member">
      <div class="space-y-4 animate-in" x-cloak>

        <!-- Profile card -->
        <div class="bg-white rounded-2xl shadow border border-gray-100 p-5">
          <div class="flex items-center gap-4">
            <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-white text-2xl font-bold flex-shrink-0"
                 style="background:linear-gradient(135deg,#078930,#2ecc71)"
                 x-text="member.member_name.charAt(0)"></div>
            <div class="flex-1 min-w-0">
              <div class="font-bold text-gray-900 text-lg leading-tight" x-text="member.member_name"></div>
              <div class="text-xs text-gray-400 mt-0.5" x-text="member.cycle_name || t('No active cycle','ንቁ ዑደት የለም')"></div>
              <div class="flex flex-wrap gap-1 mt-2">
                <template x-for="s in member.spots" :key="s.number">
                  <span class="inline-flex items-center gap-0.5 px-2.5 py-0.5 bg-equb-green/10 text-equb-green rounded-full text-xs font-bold border border-equb-green/20">
                    #<span x-text="s.number"></span>
                    <span x-show="s.share==='half'" class="text-gray-400 font-normal">½</span>
                  </span>
                </template>
                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold"
                      :class="member.summary.outstanding_count > 0
                        ? 'bg-red-100 text-red-700 border border-red-200'
                        : 'bg-green-100 text-green-700 border border-green-200'"
                      x-text="member.summary.outstanding_count > 0
                        ? t('Has overdue','ያልተከፈለ አለ')
                        : t('In good standing','ሁኔታ ጥሩ ነው')"></span>
              </div>
            </div>
            <!-- Share button -->
            <button @click="shareStatus()"
                    class="flex-shrink-0 w-9 h-9 rounded-xl bg-gray-100 hover:bg-gray-200 flex items-center justify-center transition"
                    :title="t('Share my status','ሁኔታዬን አጋራ')">
              <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Share success toast -->
        <div x-show="shareToast" x-cloak x-transition
             class="fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-gray-900 text-white text-sm px-4 py-2.5 rounded-xl shadow-lg">
          <span x-text="t('Status copied to clipboard!','ሁኔታ ተቀድቷል!')"></span>
        </div>

        <!-- Stat cards -->
        <div class="grid grid-cols-3 gap-3">
          <div class="bg-white rounded-2xl border border-gray-100 shadow p-4 text-center">
            <div class="text-3xl font-black text-equb-green" x-text="member.summary.paid_weeks"></div>
            <div class="text-xs text-gray-400 mt-1 font-medium" x-text="t('Weeks Paid','የተከፈሉ')"></div>
            <div class="w-6 h-0.5 bg-equb-green/30 rounded mx-auto mt-2"></div>
          </div>
          <div class="rounded-2xl border shadow p-4 text-center"
               :class="member.summary.outstanding_count > 0 ? 'bg-red-50 border-red-200' : 'bg-white border-gray-100'">
            <div class="text-3xl font-black"
                 :class="member.summary.outstanding_count > 0 ? 'text-red-600' : 'text-gray-200'"
                 x-text="member.summary.outstanding_count"></div>
            <div class="text-xs mt-1 font-medium"
                 :class="member.summary.outstanding_count > 0 ? 'text-red-500' : 'text-gray-400'"
                 x-text="t('Overdue','ያልተከፈሉ')"></div>
            <div class="w-6 h-0.5 rounded mx-auto mt-2"
                 :class="member.summary.outstanding_count > 0 ? 'bg-red-300' : 'bg-gray-200'"></div>
          </div>
          <div class="bg-white rounded-2xl border border-gray-100 shadow p-4 text-center">
            <div class="text-xl font-black text-orange-500 leading-tight" x-text="fmtShort(member.summary.total_paid_amount)"></div>
            <div class="text-xs text-gray-400 mt-1 font-medium" x-text="t('Total Paid','ጠቅላላ')"></div>
            <div class="w-6 h-0.5 bg-orange-200 rounded mx-auto mt-2"></div>
          </div>
        </div>

        <!-- Next Payment Due -->
        <div x-show="member.next_due"
             class="rounded-2xl border shadow overflow-hidden"
             :class="member.next_due && member.next_due.status !== 'pending'
               ? 'bg-red-50 border-red-200'
               : 'bg-amber-50 border-amber-200'">
          <div class="px-5 py-4 flex items-center gap-4">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0"
                 :class="member.next_due && member.next_due.status !== 'pending' ? 'bg-red-100' : 'bg-amber-100'">
              <svg class="w-5 h-5" :class="member.next_due && member.next_due.status !== 'pending' ? 'text-red-600' : 'text-amber-600'"
                   fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
            </div>
            <div class="flex-1">
              <div class="text-xs font-semibold uppercase tracking-wide mb-0.5"
                   :class="member.next_due && member.next_due.status !== 'pending' ? 'text-red-600' : 'text-amber-600'"
                   x-text="member.next_due && member.next_due.status !== 'pending'
                     ? t('Overdue Payment','የዘገየ ክፍያ')
                     : t('Next Payment Due','ቀጣይ ክፍያ')"></div>
              <div class="font-bold text-gray-900 text-sm">
                <span x-text="t('Week','ሳምንት') + ' ' + (member.next_due ? member.next_due.week_number : '')"></span>
                &mdash;
                <span x-text="member.next_due ? fmtDate(member.next_due.draw_date) : ''"></span>
              </div>
            </div>
            <div class="text-right flex-shrink-0">
              <div class="font-black text-lg" :class="member.next_due && member.next_due.status !== 'pending' ? 'text-red-700' : 'text-amber-700'"
                   x-text="member.next_due ? fmt(member.next_due.amount) : ''"></div>
              <span class="text-xs font-semibold px-2 py-0.5 rounded-full"
                    :class="'status-' + (member.next_due ? member.next_due.status : '')"
                    x-text="member.next_due ? (member.next_due.status.charAt(0).toUpperCase() + member.next_due.status.slice(1)) : ''"></span>
            </div>
          </div>
        </div>

        <!-- Pot Week (scheduled) -->
        <div x-show="member.pot_week" class="pot-week-card rounded-2xl shadow overflow-hidden">
          <div class="px-5 py-4 flex items-center gap-4">
            <div class="w-10 h-10 rounded-xl bg-white/15 flex items-center justify-center flex-shrink-0">
              <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20">
                <path d="M8.433 7.418c.155-.103.346-.196.567-.267v1.698a2.305 2.305 0 01-.567-.267C8.07 8.34 8 8.114 8 8c0-.114.07-.34.433-.582zM11 12.849v-1.698c.22.071.412.164.567.267.364.243.433.468.433.582 0 .114-.07.34-.433.582a2.305 2.305 0 01-.567.267z"/>
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-13a1 1 0 10-2 0v.092a4.535 4.535 0 00-1.676.662C6.602 6.234 6 7.009 6 8c0 .99.602 1.765 1.324 2.246.48.32 1.054.545 1.676.662v1.941c-.391-.127-.68-.317-.843-.504a1 1 0 10-1.51 1.31c.562.649 1.413 1.076 2.353 1.253V15a1 1 0 102 0v-.092a4.535 4.535 0 001.676-.662C13.398 13.766 14 12.991 14 12c0-.99-.602-1.765-1.324-2.246A4.535 4.535 0 0011 9.092V7.151c.391.127.68.317.843.504a1 1 0 101.511-1.31c-.563-.649-1.413-1.076-2.354-1.253V5z" clip-rule="evenodd"/>
              </svg>
            </div>
            <div class="flex-1 min-w-0">
              <div class="text-xs font-semibold text-blue-200 uppercase tracking-wide mb-0.5"
                   x-text="t('Your Scheduled Pot','የሚቀበሉበት ሳምንት')"></div>
              <div class="font-bold text-white text-sm">
                <span x-text="t('Week','ሳምንት') + ' ' + (member.pot_week ? member.pot_week.week_number : '')"></span>
                &mdash;
                <span x-text="member.pot_week ? fmtDate(member.pot_week.draw_date) : ''"></span>
              </div>
            </div>
            <div class="text-right flex-shrink-0">
              <div class="font-black text-white text-lg" x-text="member.pot_week ? fmtShort(member.pot_week.net_pot) : ''"></div>
              <div class="text-blue-200 text-xs" x-text="member.pot_week ? fmt(member.pot_week.net_pot) : ''"></div>
            </div>
          </div>
        </div>

        <!-- Overdue alert -->
        <div x-show="member.summary.outstanding_count > 0"
             class="bg-red-50 border border-red-200 rounded-2xl p-4">
          <div class="flex items-start gap-3">
            <div class="w-9 h-9 rounded-xl bg-red-100 flex items-center justify-center flex-shrink-0">
              <svg class="w-5 h-5 text-red-600" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
              </svg>
            </div>
            <div>
              <div class="font-bold text-red-800 text-sm" x-text="t('Overdue Payments','ያልተከፈሉ ክፍያዎች')"></div>
              <div class="text-sm text-red-700 mt-0.5">
                <span x-text="member.summary.outstanding_count"></span>
                <span x-text="t(' week(s) totaling ',' ሳምንት፣ ጠቅላላ ')"></span>
                <strong x-text="fmt(member.summary.outstanding_amount)"></strong>
                <span x-text="t(' are past due.',' ቀርቷል።')"></span>
              </div>
            </div>
          </div>
        </div>

        <!-- Pot wins (already received) -->
        <div x-show="member.wins.length > 0" class="bg-white rounded-2xl border border-gray-100 shadow overflow-hidden">
          <div class="pot-win-card px-5 py-4 flex items-center gap-2">
            <svg class="w-5 h-5 text-yellow-300" fill="currentColor" viewBox="0 0 20 20">
              <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
            </svg>
            <div class="font-bold text-white" x-text="t('Your Pot Win(s)','ያሸነፉት ዕጣ')"></div>
          </div>
          <div class="divide-y divide-gray-50">
            <template x-for="w in member.wins" :key="w.week_number">
              <div class="px-5 py-4 flex items-center gap-4">
                <div class="week-circle week-paid">W<span x-text="w.week_number"></span></div>
                <div class="flex-1">
                  <div class="font-semibold text-sm text-gray-900"><span x-text="t('Week','ሳምንት')"></span> <span x-text="w.week_number"></span></div>
                  <div class="text-xs text-gray-400" x-text="fmtDate(w.draw_date)"></div>
                </div>
                <div class="text-right">
                  <div class="font-black text-equb-green text-base" x-text="fmtShort(w.buyer_receives)"></div>
                  <div class="text-xs text-gray-400" x-text="fmt(w.buyer_receives)"></div>
                </div>
              </div>
            </template>
          </div>
        </div>

        <!-- Upcoming draws -->
        <div x-show="member.upcoming.length > 0" class="bg-white rounded-2xl border border-gray-100 shadow overflow-hidden">
          <div class="px-5 py-3.5 border-b border-gray-100 flex items-center gap-2">
            <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            <div class="font-semibold text-gray-800 text-sm" x-text="t('Upcoming Draws','መጪ ዕጣዎች')"></div>
          </div>
          <div class="divide-y divide-gray-50">
            <template x-for="w in member.upcoming" :key="w.week_number">
              <div class="px-5 py-4 flex items-center gap-4">
                <div class="week-circle week-future">W<span x-text="w.week_number"></span></div>
                <div class="flex-1">
                  <div class="font-semibold text-sm text-gray-900 flex items-center gap-1.5">
                    <span x-text="t('Week','ሳምንት')"></span> <span x-text="w.week_number"></span>
                    <span x-show="w.is_group_week"
                          class="text-purple-600 bg-purple-50 text-xs px-1.5 py-0.5 rounded-full border border-purple-200"
                          x-text="t('Group','ቡድን')"></span>
                  </div>
                  <div class="text-xs text-gray-400" x-text="fmtDate(w.draw_date)"></div>
                </div>
                <span class="text-xs font-semibold text-blue-600 bg-blue-50 px-2.5 py-1 rounded-full border border-blue-100"
                      x-text="t('Upcoming','መጪ')"></span>
              </div>
            </template>
          </div>
        </div>

        <!-- Payment history -->
        <div class="bg-white rounded-2xl border border-gray-100 shadow overflow-hidden">
          <div class="px-5 py-3.5 border-b border-gray-100 flex items-center justify-between">
            <div class="flex items-center gap-2">
              <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
              </svg>
              <div class="font-semibold text-gray-800 text-sm" x-text="t('Payment History','የክፍያ ታሪክ')"></div>
            </div>
            <div class="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded-full"
                 x-text="member.payments.length + ' ' + t('weeks','ሳምንቶች')"></div>
          </div>
          <div class="divide-y divide-gray-50 max-h-[480px] overflow-y-auto">
            <template x-for="p in member.payments.slice().reverse()" :key="p.week_number">
              <div :class="!p.is_past && p.status==='pending' ? 'opacity-40' : ''">
                <!-- Main row -->
                <div class="px-5 py-3 flex items-center gap-4">
                  <div class="week-circle flex-shrink-0"
                       :class="{'week-paid':p.status==='paid','week-missed':p.status==='missed','week-late':p.status==='late','week-pending':p.status==='pending'&&p.is_past,'week-future':p.status==='pending'&&!p.is_past}">
                    <span x-text="p.week_number"></span>
                  </div>
                  <div class="flex-1 min-w-0">
                    <div class="font-semibold text-sm text-gray-900"><span x-text="t('Week','ሳምንት')"></span> <span x-text="p.week_number"></span></div>
                    <div class="text-xs text-gray-400" x-text="fmtDate(p.draw_date)"></div>
                    <div x-show="p.paid_date" class="text-xs text-gray-400 mt-0.5">
                      <span x-text="t('Paid','ተከፍሏል')"></span> <span x-text="fmtDate(p.paid_date)"></span>
                      <span x-show="p.payment_method" x-text="' · ' + p.payment_method"></span>
                    </div>
                  </div>
                  <div class="flex flex-col items-end gap-1.5 flex-shrink-0">
                    <span class="text-sm font-bold text-gray-800" x-text="fmt(p.amount)"></span>
                    <span class="text-xs font-semibold px-2 py-0.5 rounded-full"
                          :class="'status-' + p.status"
                          x-text="p.status ? p.status.charAt(0).toUpperCase() + p.status.slice(1) : ''"></span>
                  </div>
                </div>
                <!-- Print receipt button — full-width, clearly visible on paid rows -->
                <div x-show="p.status === 'paid'" class="px-5 pb-3">
                  <a :href="'/api/portal/payments/' + p.id + '/receipt?phone=' + encodeURIComponent(phone) + '&spot_number=' + encodeURIComponent(spotNumber) + '&print=1'"
                     target="_blank"
                     class="flex items-center justify-center gap-2 w-full py-2 rounded-xl border border-equb-green/30 text-equb-green text-xs font-semibold hover:bg-equb-green hover:text-white transition">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/>
                    </svg>
                    <span x-text="t('Print Receipt','ደረሰኝ አትም')"></span>
                  </a>
                </div>
              </div>
            </template>
            <div x-show="!member.payments.length"
                 class="px-5 py-10 text-center text-sm text-gray-400 flex flex-col items-center gap-2">
              <svg class="w-8 h-8 text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                      d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
              </svg>
              <span x-text="t('No payment records in the active cycle.','ምንም ክፍያ አልተገኘም።')"></span>
            </div>
          </div>
        </div>

        <!-- Admin contact -->
        <div x-show="member.admin_contact" class="bg-white rounded-2xl border border-gray-100 shadow p-5">
          <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3"
               x-text="t('Need help? Contact your admin','እርዳታ ይፈልጋሉ? አስተዳዳሪን ያናግሩ')"></div>
          <div class="flex gap-3">
            <a :href="'tel:' + member.admin_contact"
               class="flex-1 flex items-center justify-center gap-2 bg-equb-green text-white py-3 rounded-xl text-sm font-semibold hover:bg-[#056824] transition">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
              </svg>
              <span x-text="t('Call','ደውሉ')"></span>
            </a>
            <a :href="'https://wa.me/' + waNumber(member.admin_contact)"
               target="_blank"
               class="flex-1 flex items-center justify-center gap-2 bg-[#25D366] text-white py-3 rounded-xl text-sm font-semibold hover:bg-[#1ebe5b] transition">
              <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
              </svg>
              <span x-text="t('WhatsApp','ዋትስአፕ')"></span>
            </a>
          </div>
        </div>

      </div>
    </template>

  </main>

  <footer class="mt-8 pb-8 text-center">
    <div class="text-xs text-gray-400 mb-3" x-text="t('Equb Management System — Member Portal','የእቁብ አስተዳደር ሥርዓት — የአባልት ፖርታል')"></div>
    <div class="w-20 mx-auto h-1 rounded-full overflow-hidden"
         style="background:linear-gradient(to right,#078930 33.33%,#FCDD09 33.33% 66.66%,#DA121A 66.66%)"></div>
  </footer>

<script>
function portal() {
  return {
    phone: '',
    spotNumber: '',
    loading: false,
    error: '',
    member: null,
    lang: 'en',
    shareToast: false,

    async init() {},

    t(en, am) { return this.lang === 'am' ? am : en; },

    signOut() {
      this.member = null;
      this.phone = '';
      this.spotNumber = '';
      this.error = '';
    },

    async lookup() {
      const p = this.phone.trim();
      const s = String(this.spotNumber).trim();
      if (!p || !s) return;
      this.loading = true;
      this.error = '';
      this.member = null;
      try {
        const url = '/api/portal/lookup?phone=' + encodeURIComponent(p) + '&spot_number=' + encodeURIComponent(s);
        const res = await fetch(url);
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          this.error = body.detail || this.t(
            'No member found with this phone number and spot number.',
            'በዚህ ስልክ ቁጥር እና ዕጣ ቁጥር ምንም አባል አልተገኘም።'
          );
          return;
        }
        this.member = await res.json();
      } catch(e) {
        this.error = this.t('Network error — please try again.', 'የአውታረ መረብ ስህተት — እንደገና ይሞክሩ።');
      } finally {
        this.loading = false;
      }
    },

    async shareStatus() {
      if (!this.member) return;
      const m = this.member;
      const spots = m.spots.map(s => '#' + s.number + (s.share === 'half' ? '½' : '')).join(', ');
      const standing = m.summary.outstanding_count > 0 ? '⚠ Has overdue' : '✅ In good standing';
      const text = [
        `My Equb Status — ${m.cycle_name || 'Equb'}`,
        `Name: ${m.member_name}  |  Spot: ${spots}`,
        `${standing}`,
        `Paid: ${m.summary.paid_weeks} weeks  |  Total: ${this.fmtShort(m.summary.total_paid_amount)}`,
        m.pot_week ? `🗓 Pot scheduled: Week ${m.pot_week.week_number} (${this.fmtDate(m.pot_week.draw_date)})` : '',
      ].filter(Boolean).join('\n');

      if (navigator.share) {
        try { await navigator.share({ text }); return; } catch {}
      }
      try {
        await navigator.clipboard.writeText(text);
        this.shareToast = true;
        setTimeout(() => this.shareToast = false, 2500);
      } catch {}
    },

    waNumber(phone) {
      if (!phone) return '';
      let p = phone.replace(/\s/g, '');
      if (p.startsWith('+')) p = p.slice(1);
      else if (p.startsWith('0')) p = '251' + p.slice(1);
      return p;
    },

    fmt(n) {
      if (n == null) return '—';
      return Number(n).toLocaleString('en-ET', { minimumFractionDigits: 0, maximumFractionDigits: 0 }) + ' ETB';
    },

    fmtShort(n) {
      if (n == null) return '—';
      const v = Number(n);
      if (v >= 1_000_000) return (v / 1_000_000).toFixed(v % 1_000_000 === 0 ? 0 : 1) + 'M ETB';
      if (v >= 1_000)     return (v / 1_000).toFixed(v % 1_000 === 0 ? 0 : 1) + 'K ETB';
      return v.toLocaleString('en-ET') + ' ETB';
    },

    fmtDate(d) {
      if (!d) return '—';
      try { return new Date(d).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }); }
      catch { return d; }
    },

    fmt_date(d) { return this.fmtDate(d); },
  };
}
</script>

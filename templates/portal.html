<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#060E09"/>
<title>My Equb — Member Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Ethiopic:wght@400;600;700;900&family=DM+Serif+Display&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
:root {
  --g0: #060E09; --g1: #0A1A0E; --g2: #0F2614;
  --g3: #1A3D20; --g4: #2D6A4F; --g5: #3A8A65;
  --gold: #C9A020; --gold-lt: #E8C84A; --gold-dim: rgba(201,160,32,0.15);
  --ivory: #FAF6EF; --ink: #1A1A1A;
  --muted: #6B7A6E; --border: rgba(201,160,32,0.15);
  --red: #DC2626; --amber: #D97706;
  --font-display: 'DM Serif Display', Georgia, serif;
  --font-ui: 'Outfit', system-ui, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
html { scroll-behavior: smooth; }
body { font-family: var(--font-ui); background: #0f1a12; min-height: 100vh; color: var(--ink); }
[x-cloak] { display: none !important; }

/* ── TOPBAR ── */
.topbar {
  background: var(--g0);
  border-bottom: 1px solid rgba(201,160,32,0.12);
  position: sticky; top: 0; z-index: 50;
}
.topbar-inner { max-width: 480px; margin: 0 auto; padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; }
.topbar-brand { display: flex; align-items: center; gap: 12px; }
.topbar-emblem {
  width: 38px; height: 38px; border-radius: 10px;
  background: linear-gradient(135deg, var(--gold-lt), var(--gold));
  display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Serif Ethiopic', serif; font-size: 17px; font-weight: 900;
  color: var(--g0); flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(201,160,32,0.3);
}
.topbar-name { font-family: 'Noto Serif Ethiopic', serif; font-size: 17px; font-weight: 700; color: #fff; line-height: 1; }
.topbar-sub  { font-size: 10px; color: rgba(201,160,32,0.7); letter-spacing: 0.5px; margin-top: 2px; }
.topbar-actions { display: flex; align-items: center; gap: 8px; }
.lang-pill {
  display: flex; gap: 2px;
  background: rgba(255,255,255,0.06); border-radius: 8px; padding: 3px;
}
.lang-btn {
  font-size: 11px; font-weight: 600; padding: 4px 9px; border-radius: 6px;
  border: none; cursor: pointer; transition: all .15s; font-family: var(--font-ui);
  color: rgba(255,255,255,.45); background: transparent;
}
.lang-btn.active { background: var(--g4); color: #fff; }
.signout-btn {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.4);
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px; padding: 5px 10px; cursor: pointer; transition: all .15s;
  font-family: var(--font-ui);
}
.signout-btn:hover { color: rgba(255,255,255,0.75); background: rgba(255,255,255,0.1); }

/* flag bar */
.flag-bar { height: 3px; background: linear-gradient(90deg,#078930 33.33%,#FCDD09 33.33% 66.66%,#DA121A 66.66%); }

/* ── LAYOUT ── */
.page { max-width: 480px; margin: 0 auto; padding: 0 0 48px; }

/* ── LOGIN SECTION ── */
.login-hero {
  background: var(--g0);
  padding: 40px 20px 32px;
  text-align: center;
  position: relative; overflow: hidden;
}
.login-hero::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 20% 100%, rgba(45,106,79,.45) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 85% 10%, rgba(201,160,32,.12) 0%, transparent 55%);
  pointer-events: none;
}
.login-hero-title {
  font-family: 'Noto Serif Ethiopic', serif;
  font-size: 32px; font-weight: 900; color: #fff;
  line-height: 1.15; margin-bottom: 8px; position: relative; z-index: 1;
}
.login-hero-sub { font-size: 13px; color: rgba(255,255,255,.45); font-weight: 300; position: relative; z-index: 1; max-width: 280px; margin: 0 auto; line-height: 1.6; }

.login-card {
  background: var(--ivory);
  margin: 0 16px;
  border-radius: 24px;
  box-shadow: 0 -8px 40px rgba(0,0,0,.35), 0 20px 60px rgba(0,0,0,.2);
  overflow: hidden;
  position: relative; z-index: 2;
  transform: translateY(-20px);
  margin-bottom: -8px;
}
.login-card-top { height: 3px; background: linear-gradient(90deg, var(--g5), var(--gold)); }
.login-card-body { padding: 28px 24px 24px; }
.field-label { display:block; font-size:10px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; color:var(--muted); margin-bottom:7px; }
.field-wrap { position: relative; margin-bottom: 16px; }
.field-icon { position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; width:16px; height:16px; transition:color .15s; }
.field-wrap:focus-within .field-icon { color: var(--g4); }
.field-input {
  width:100%; padding:12px 14px 12px 40px;
  border:1.5px solid #DDD5C3; border-radius:10px;
  font-family:var(--font-ui); font-size:14px; color:var(--ink);
  background:#fff; outline:none; transition:all .2s;
}
.field-input::placeholder { color:#C8C0B4; font-weight:300; }
.field-input:focus { border-color:var(--g4); box-shadow:0 0 0 3px rgba(45,106,79,.1); }
.field-input.spot { padding-left: 28px; }
.spot-prefix { position:absolute; left:13px; top:50%; transform:translateY(-50%); font-weight:700; font-size:14px; color:#B8B0A2; pointer-events:none; }
.error-box { display:flex; align-items:flex-start; gap:8px; background:#FEF2F2; border:1px solid #FECACA; border-radius:10px; padding:11px 13px; margin-bottom:14px; font-size:13px; color:#B91C1C; }
.submit-btn {
  width:100%; padding:13px; background:var(--g0); color:#fff;
  border:none; border-radius:10px; font-family:var(--font-ui); font-size:14px;
  font-weight:600; cursor:pointer; transition:all .2s;
  display:flex; align-items:center; justify-content:center; gap:8px;
  position:relative; overflow:hidden;
}
.submit-btn::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,transparent 40%,rgba(201,160,32,.1) 100%); pointer-events:none; }
.submit-btn:hover:not(:disabled) { background:var(--g3); transform:translateY(-1px); box-shadow:0 6px 18px rgba(6,14,9,.3); }
.submit-btn:disabled { opacity:.5; cursor:not-allowed; }
.spinner { width:15px; height:15px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0; }
@keyframes spin { to{transform:rotate(360deg)} }
.privacy-note { display:flex; align-items:center; justify-content:center; gap:5px; font-size:11px; color:var(--muted); margin-top:14px; }

/* ── MEMBER DASHBOARD ── */
.member-hero {
  background: var(--g0);
  padding: 28px 20px 80px;
  position: relative; overflow: hidden;
}
.member-hero::before {
  content:''; position:absolute; inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 10% 100%, rgba(45,106,79,.5) 0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 90% 0%, rgba(201,160,32,.15) 0%, transparent 50%);
  pointer-events:none;
}
.member-avatar-ring {
  position: relative; z-index:1;
  width: 68px; height: 68px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), var(--gold-lt));
  display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Serif Ethiopic', serif; font-size: 26px; font-weight: 900;
  color: var(--g0);
  box-shadow: 0 0 0 3px rgba(201,160,32,.3), 0 8px 24px rgba(0,0,0,.4);
  flex-shrink: 0; margin-bottom: 14px;
}
.member-hero-name {
  font-family: 'Noto Serif Ethiopic', serif;
  font-size: 22px; font-weight: 700; color: #fff;
  line-height: 1.2; margin-bottom: 4px; position: relative; z-index:1;
}
.member-hero-cycle { font-size: 12px; color: rgba(255,255,255,.4); position: relative; z-index:1; margin-bottom: 10px; }
.spot-tag {
  display: inline-flex; align-items: center; gap: 3px;
  background: rgba(201,160,32,.18); border: 1px solid rgba(201,160,32,.3);
  color: var(--gold-lt); font-size: 11px; font-weight: 700;
  padding: 3px 9px; border-radius: 99px; margin-right: 4px; margin-bottom: 4px;
}
.standing-tag {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 99px;
}
.standing-ok   { background: rgba(45,106,79,.3); color: #4CAF82; border:1px solid rgba(76,175,130,.25); }
.standing-bad  { background: rgba(220,38,38,.2);  color: #fca5a5; border:1px solid rgba(220,38,38,.25); }
.share-btn {
  position: absolute; top: 20px; right: 18px; z-index: 5;
  width: 36px; height: 36px; border-radius: 10px;
  background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background .15s;
}
.share-btn:hover { background: rgba(255,255,255,.14); }

/* ── CARDS FLOAT UP OVER HERO ── */
.cards-area { padding: 0 14px; margin-top: -56px; position: relative; z-index: 10; }

/* ── STAT ROW ── */
.stat-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.stat-card {
  background: #fff; border-radius: 16px;
  border: 1px solid rgba(0,0,0,.06);
  box-shadow: 0 4px 16px rgba(0,0,0,.08);
  padding: 14px 10px; text-align: center;
}
.stat-card.red { background: #FEF2F2; border-color: rgba(220,38,38,.15); }
.stat-number { font-family: var(--font-display); font-size: 1.9rem; line-height: 1; color: var(--gold); }
.stat-number.green { color: #2D6A4F; }
.stat-number.red   { color: var(--red); font-size: 1.7rem; }
.stat-number.amber { color: var(--amber); }
.stat-label { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-top: 5px; }
.stat-bar { width: 24px; height: 2px; border-radius: 99px; margin: 6px auto 0; background: rgba(0,0,0,.08); }
.stat-bar.gold  { background: var(--gold); opacity:.4; }
.stat-bar.green { background: #2D6A4F; opacity:.35; }
.stat-bar.red   { background: var(--red); opacity:.4; }

/* ── SECTION CARD ── */
.section-card {
  background: #fff; border-radius: 18px;
  border: 1px solid rgba(0,0,0,.06);
  box-shadow: 0 4px 16px rgba(0,0,0,.07);
  overflow: hidden; margin-bottom: 12px;
}
.section-card.danger { background: #FEF2F2; border-color: rgba(220,38,38,.15); }
.section-card.amber  { background: #FFFBEB; border-color: rgba(217,119,6,.15); }
.section-card.dark-blue { background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%); }
.section-card.dark-green{ background: linear-gradient(135deg, #064e20 0%, #078930 100%); }
.section-header { display:flex; align-items:center; gap:8px; padding:13px 18px; border-bottom:1px solid rgba(0,0,0,.05); }
.section-header.no-border { border-bottom:none; }
.section-header svg { flex-shrink:0; }
.section-title { font-size:13px; font-weight:600; color:#1a1a1a; }
.badge-count { font-size:10px; font-weight:700; padding:2px 7px; border-radius:99px; background:rgba(0,0,0,.06); color:var(--muted); margin-left:auto; }

/* ── WEEK ROW ── */
.week-row { display:flex; align-items:center; gap:12px; padding:12px 18px; border-bottom:1px solid rgba(0,0,0,.04); }
.week-row:last-child { border-bottom:none; }
.week-num {
  width:34px; height:34px; border-radius:50%; display:flex; align-items:center;
  justify-content:center; font-weight:700; font-size:.7rem; flex-shrink:0;
}
.wn-paid    { background:#dcfce7; color:#15803d; }
.wn-missed  { background:#fee2e2; color:#b91c1c; }
.wn-late    { background:#ffedd5; color:#c2410c; }
.wn-partial { background:#fff7ed; color:#c2410c; }
.wn-pending { background:#f1f5f9; color:#64748b; }
.wn-future  { background:rgba(255,255,255,.12); color:rgba(255,255,255,.5); }
.week-info { flex:1; min-width:0; }
.week-title { font-size:13px; font-weight:600; color:#111; }
.week-date  { font-size:11px; color:var(--muted); margin-top:1px; }
.week-paid-date{ font-size:10px; color:var(--muted); margin-top:1px; }
.status-pill {
  font-size:10px; font-weight:700; padding:3px 9px; border-radius:99px; flex-shrink:0;
}
.sp-paid    { background:#dcfce7; color:#15803d; border:1px solid #bbf7d0; }
.sp-pending { background:#fef9c3; color:#854d0e; border:1px solid #fde68a; }
.sp-late    { background:#ffedd5; color:#c2410c; border:1px solid #fed7aa; }
.sp-missed  { background:#fee2e2; color:#b91c1c; border:1px solid #fecaca; }
.sp-partial { background:#fff7ed; color:#c2410c; border:1px solid #fed7aa; }
.sp-upcoming{ background:#eff6ff; color:#1d4ed8; border:1px solid #bfdbfe; }
.amount-val { font-family:var(--font-display); font-size:1rem; color:var(--gold); line-height:1; }
.amount-val.white { color:#fff; }
.amount-sub { font-size:10px; color:var(--muted); margin-top:1px; }

/* ── NEXT DUE / OVERDUE ── */
.due-card { display:flex; align-items:center; gap:12px; padding:14px 18px; }
.due-icon { width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.due-icon.amber { background:rgba(217,119,6,.12); }
.due-icon.red   { background:rgba(220,38,38,.12); }
.due-label { font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; margin-bottom:3px; }
.due-label.amber { color:var(--amber); }
.due-label.red   { color:var(--red); }
.due-week { font-size:13px; font-weight:600; color:#111; }
.due-amount { font-family:var(--font-display); font-size:1.25rem; line-height:1; }
.due-amount.amber { color:var(--amber); }
.due-amount.red   { color:var(--red); }

/* ── POT CARDS (dark) ── */
.dark-row { display:flex; align-items:center; gap:12px; padding:14px 18px; }
.dark-icon { width:38px; height:38px; border-radius:10px; background:rgba(255,255,255,.12); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.dark-label { font-size:10px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; margin-bottom:3px; }
.dark-week  { font-size:13px; font-weight:600; color:#fff; }

/* ── OVERDUE ALERT ── */
.overdue-alert { display:flex; align-items:flex-start; gap:12px; padding:14px 18px; }
.overdue-icon { width:36px; height:36px; border-radius:10px; background:rgba(220,38,38,.1); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.overdue-title { font-size:13px; font-weight:700; color:#b91c1c; margin-bottom:3px; }
.overdue-body  { font-size:12px; color:#dc2626; line-height:1.5; }

/* ── RECEIPT BTN ── */
.receipt-btn {
  display:flex; align-items:center; justify-content:center; gap:6px;
  margin:0 18px 12px; padding:8px; border-radius:10px;
  border:1px solid rgba(45,106,79,.25); color:var(--g4);
  font-size:11px; font-weight:600; text-decoration:none;
  transition:all .15s;
}
.receipt-btn:hover { background:var(--g4); color:#fff; border-color:var(--g4); }

/* ── ADMIN CONTACT ── */
.contact-card { padding:16px 18px; }
.contact-label { font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }
.contact-btns { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.contact-btn {
  display:flex; align-items:center; justify-content:center; gap:6px;
  padding:11px; border-radius:10px; font-size:13px; font-weight:600;
  text-decoration:none; transition:all .15s;
}
.contact-btn.green { background:var(--g4); color:#fff; }
.contact-btn.green:hover { background:var(--g3); }
.contact-btn.wa { background:#25D366; color:#fff; }
.contact-btn.wa:hover { background:#1db954; }

/* ── TOAST ── */
.toast {
  position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:100;
  background:rgba(6,14,9,.92); color:#fff; font-size:13px; font-weight:500;
  padding:10px 20px; border-radius:12px;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
  border:1px solid rgba(201,160,32,.2);
  white-space:nowrap;
}

/* ── EMPTY HISTORY ── */
.empty-history { padding:40px 20px; text-align:center; color:var(--muted); font-size:13px; display:flex; flex-direction:column; align-items:center; gap:8px; }

/* ── FOOTER ── */
.portal-footer { text-align:center; padding:24px 20px 16px; }
.portal-footer-text { font-size:11px; color:rgba(255,255,255,.2); margin-bottom:10px; }
.portal-footer-flag { width:48px; height:3px; border-radius:2px; overflow:hidden; margin:0 auto; background:linear-gradient(90deg,#078930 33.33%,#FCDD09 33.33% 66.66%,#DA121A 66.66%); }

/* ── FADE IN ── */
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.fade-up { animation:fadeUp .35s ease-out; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,.15); border-radius:99px; }

/* ── PAYMENT HISTORY SCROLL ── */
.history-scroll { max-height: 520px; overflow-y: auto; }
</style>
</head>

<body x-data="portal()" x-init="init()">

<!-- ── TOPBAR ── -->
<div class="topbar">
  <div class="flag-bar"></div>
  <div class="topbar-inner">
    <div class="topbar-brand">
      <div class="topbar-emblem">እ</div>
      <div>
        <div class="topbar-name">እቁብ</div>
        <div class="topbar-sub" x-text="t('Member Portal','የአባልት ፖርታል')"></div>
      </div>
    </div>
    <div class="topbar-actions">
      <div class="lang-pill">
        <button @click="lang='en'" :class="lang==='en' ? 'active' : ''" class="lang-btn">EN</button>
        <button @click="lang='am'" :class="lang==='am' ? 'active' : ''" class="lang-btn">አማ</button>
      </div>
      <button x-show="member" @click="signOut()" x-cloak class="signout-btn">
        <svg style="width:13px;height:13px" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        <span x-text="t('Sign out','ውጣ')"></span>
      </button>
    </div>
  </div>
</div>

<!-- ── TOAST ── -->
<div x-show="shareToast" x-cloak x-transition class="toast" x-text="t('Status copied!','ሁኔታ ተቀድቷል!')"></div>

<div class="page">

  <!-- ══════════ LOGIN VIEW ══════════ -->
  <div x-show="!member" class="fade-up">

    <!-- Hero -->
    <div class="login-hero">
      <div class="login-hero-title" x-text="t('My Equb','የእኔ እቁብ')"></div>
      <div class="login-hero-sub" x-text="t('View your payment history, upcoming draws, and cycle status.','የክፍያ ታሪክዎን፣ መጪ ዕጣዎችዎን እና ዑደት ሁኔታዎን ይመልከቱ።')"></div>
    </div>

    <!-- Form card -->
    <div class="login-card">
      <div class="login-card-top"></div>
      <div class="login-card-body">

        <!-- Phone -->
        <div class="field-wrap">
          <label class="field-label" x-text="t('Phone Number','ስልክ ቁጥር')"></label>
          <div style="position:relative">
            <svg class="field-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
            </svg>
            <input x-model="phone" type="tel" class="field-input"
                   :placeholder="t('09… or +251…','09… ወይም +251…')"
                   :disabled="loading"/>
          </div>
        </div>

        <!-- Spot number -->
        <div class="field-wrap">
          <label class="field-label" x-text="t('Spot Number','ዕጣ ቁጥር')"></label>
          <div style="position:relative">
            <span class="spot-prefix">#</span>
            <input x-model="spotNumber" @keydown.enter="lookup()" type="number" min="1"
                   class="field-input spot"
                   :placeholder="t('e.g. 5','ለምሳሌ 5')"
                   :disabled="loading"/>
          </div>
        </div>

        <!-- Error -->
        <div x-show="error" x-cloak class="error-box">
          <svg style="width:15px;height:15px;flex-shrink:0;margin-top:1px" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
          </svg>
          <span x-text="error"></span>
        </div>

        <!-- Submit -->
        <button @click="lookup()" :disabled="loading || !phone.trim() || !spotNumber" class="submit-btn">
          <div class="spinner" x-show="loading"></div>
          <span x-show="!loading" x-text="t('View My Status →','ሁኔታዬን እይ →')"></span>
        </button>

        <div class="privacy-note">
          <svg style="width:12px;height:12px;color:#9ca3af" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
          </svg>
          <span style="color:var(--muted)" x-text="t('Your data is private','ሁኔታዎ የግል ነው')"></span>
        </div>
      </div>
    </div>

  </div>

  <!-- ══════════ DASHBOARD VIEW ══════════ -->
  <template x-if="member">
    <div class="fade-up">

      <!-- Member hero -->
      <div class="member-hero">
        <button @click="shareStatus()" class="share-btn" :title="t('Share status','ሁኔታ አጋራ')">
          <svg style="width:15px;height:15px;color:rgba(255,255,255,.55)" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
          </svg>
        </button>
        <div class="member-avatar-ring" x-text="(member.member_name||'?').charAt(0)"></div>
        <div class="member-hero-name" x-text="member.member_name"></div>
        <div class="member-hero-cycle" x-text="member.cycle_name || t('No active cycle','ንቁ ዑደት የለም')"></div>
        <div style="position:relative;z-index:1">
          <template x-for="s in member.spots" :key="s.number">
            <span class="spot-tag">
              #<span x-text="s.number"></span>
              <span x-show="s.share==='half'" style="opacity:.7;font-weight:400">½</span>
            </span>
          </template>
          <span class="standing-tag"
                :class="member.summary.outstanding_count > 0 ? 'standing-bad' : 'standing-ok'"
                x-text="member.summary.outstanding_count > 0 ? t('Has overdue','ያልተከፈለ አለ') : t('Good standing','ሁኔታ ጥሩ ነው')">
          </span>
        </div>
      </div>

      <!-- Cards area -->
      <div class="cards-area">

        <!-- Stat row -->
        <div class="stat-row">
          <div class="stat-card">
            <div class="stat-number green" x-text="member.summary.paid_weeks"></div>
            <div class="stat-label" x-text="t('Paid','የተከፈሉ')"></div>
            <div class="stat-bar green"></div>
          </div>
          <div class="stat-card" :class="member.summary.outstanding_count > 0 ? 'red' : ''">
            <div class="stat-number" :class="member.summary.outstanding_count > 0 ? 'red' : 'amber'"
                 x-text="member.summary.outstanding_count"></div>
            <div class="stat-label" x-text="t('Overdue','ያልተከፈሉ')"></div>
            <div class="stat-bar" :class="member.summary.outstanding_count > 0 ? 'red' : ''"></div>
          </div>
          <div class="stat-card">
            <div class="stat-number" style="font-size:1.15rem" x-text="fmtShort(member.summary.total_paid_amount)"></div>
            <div class="stat-label" x-text="t('Total Paid','ጠቅላላ')"></div>
            <div class="stat-bar gold"></div>
          </div>
        </div>

        <!-- Credit balance notice -->
        <div x-show="member.summary.credit_balance > 0" class="section-card"
             style="background:#eff6ff;border-color:#bfdbfe;margin-bottom:12px">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:34px;height:34px;border-radius:50%;background:#dbeafe;display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <svg style="width:16px;height:16px;color:#2563eb" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
            </div>
            <div>
              <div style="font-weight:700;color:#1d4ed8;font-size:.9rem" x-text="t('Credit Balance','ቅድሚያ ክፍያ') + ': ' + fmt(member.summary.credit_balance)"></div>
              <div style="font-size:.75rem;color:#3b82f6" x-text="t('Will be applied automatically to your next payment.','ለቀጣዩ ክፍያዎ ራስ-ሰር ይተገበራል።')"></div>
            </div>
          </div>
        </div>

        <!-- Next payment due -->
        <div x-show="member.next_due" class="section-card"
             :class="member.next_due && member.next_due.status !== 'pending' ? 'danger' : 'amber'">
          <div class="due-card">
            <div class="due-icon" :class="member.next_due && member.next_due.status !== 'pending' ? 'red' : 'amber'">
              <svg style="width:18px;height:18px" fill="none" stroke="currentColor"
                   :style="member.next_due && member.next_due.status !== 'pending' ? 'color:#dc2626' : 'color:#d97706'"
                   viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
            </div>
            <div style="flex:1">
              <div class="due-label"
                   :class="member.next_due && member.next_due.status !== 'pending' ? 'red' : 'amber'"
                   x-text="member.next_due && member.next_due.status !== 'pending' ? t('Overdue Payment','የዘገየ ክፍያ') : t('Next Payment Due','ቀጣይ ክፍያ')"></div>
              <div class="due-week">
                <span x-text="t('Week','ሳምንት') + ' ' + (member.next_due ? member.next_due.week_number : '')"></span>
                &mdash;
                <span x-text="member.next_due ? fmtDate(member.next_due.draw_date) : ''"></span>
              </div>
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div class="due-amount"
                   :class="member.next_due && member.next_due.status !== 'pending' ? 'red' : 'amber'"
                   x-text="member.next_due ? fmt(member.next_due.amount) : ''"></div>
              <span class="status-pill"
                    :class="'sp-' + (member.next_due ? member.next_due.status : '')"
                    style="margin-top:4px;display:inline-block"
                    x-text="member.next_due ? (member.next_due.status.charAt(0).toUpperCase() + member.next_due.status.slice(1)) : ''"></span>
            </div>
          </div>
        </div>

        <!-- Pot week scheduled -->
        <div x-show="member.pot_week" class="section-card dark-blue">
          <div class="dark-row">
            <div class="dark-icon">
              <svg style="width:18px;height:18px;color:#93c5fd" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-13a1 1 0 10-2 0v.092a4.535 4.535 0 00-1.676.662C6.602 6.234 6 7.009 6 8c0 .99.602 1.765 1.324 2.246.48.32 1.054.545 1.676.662v1.941c-.391-.127-.68-.317-.843-.504a1 1 0 10-1.51 1.31c.562.649 1.413 1.076 2.353 1.253V15a1 1 0 102 0v-.092a4.535 4.535 0 001.676-.662C13.398 13.766 14 12.991 14 12c0-.99-.602-1.765-1.324-2.246A4.535 4.535 0 0011 9.092V7.151c.391.127.68.317.843.504a1 1 0 101.511-1.31c-.563-.649-1.413-1.076-2.354-1.253V5z" clip-rule="evenodd"/>
              </svg>
            </div>
            <div style="flex:1">
              <div class="dark-label" style="color:rgba(147,197,253,.7)" x-text="t('Your Scheduled Pot','የሚቀበሉበት ሳምንት')"></div>
              <div class="dark-week">
                <span x-text="t('Week','ሳምንት') + ' ' + (member.pot_week ? member.pot_week.week_number : '')"></span>
                &mdash;
                <span x-text="member.pot_week ? fmtDate(member.pot_week.draw_date) : ''"></span>
              </div>
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div class="amount-val white" x-text="member.pot_week ? fmtShort(member.pot_week.net_pot) : ''"></div>
              <div class="amount-sub" style="color:rgba(147,197,253,.6)" x-text="member.pot_week ? fmt(member.pot_week.net_pot) : ''"></div>
            </div>
          </div>
        </div>

        <!-- Overdue alert -->
        <div x-show="member.summary.outstanding_count > 0" class="section-card danger">
          <div class="overdue-alert">
            <div class="overdue-icon">
              <svg style="width:18px;height:18px;color:#dc2626" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
              </svg>
            </div>
            <div>
              <div class="overdue-title" x-text="t('Overdue Payments','ያልተከፈሉ ክፍያዎች')"></div>
              <div class="overdue-body">
                <span x-text="member.summary.outstanding_count"></span>
                <span x-text="t(' week(s) totaling ',' ሳምንት፣ ጠቅላላ ')"></span>
                <strong x-text="fmt(member.summary.outstanding_amount)"></strong>
                <span x-text="t(' are past due.',' ቀርቷል።')"></span>
              </div>
            </div>
          </div>
        </div>

        <!-- Pot wins -->
        <div x-show="member.wins.length > 0" class="section-card dark-green">
          <div class="section-header no-border" style="border-bottom:1px solid rgba(255,255,255,.1)">
            <svg style="width:16px;height:16px;color:#fde68a" fill="currentColor" viewBox="0 0 20 20">
              <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
            </svg>
            <span class="section-title" style="color:#fff" x-text="t('Your Pot Win(s)','ያሸነፉት ዕጣ')"></span>
          </div>
          <template x-for="w in member.wins" :key="w.week_number">
            <div class="week-row" style="border-bottom-color:rgba(255,255,255,.08)">
              <div class="week-num wn-future">W<span x-text="w.week_number"></span></div>
              <div class="week-info">
                <div class="week-title" style="color:#fff">
                  <span x-text="t('Week','ሳምንት')"></span> <span x-text="w.week_number"></span>
                </div>
                <div class="week-date" style="color:rgba(255,255,255,.4)" x-text="fmtDate(w.draw_date)"></div>
              </div>
              <div style="text-align:right;flex-shrink:0">
                <div class="amount-val white" x-text="fmtShort(w.buyer_receives)"></div>
                <div class="amount-sub" style="color:rgba(255,255,255,.4)" x-text="fmt(w.buyer_receives)"></div>
              </div>
            </div>
          </template>
        </div>

        <!-- Upcoming draws -->
        <div x-show="member.upcoming.length > 0" class="section-card">
          <div class="section-header">
            <svg style="width:15px;height:15px;color:#3b82f6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            <span class="section-title" x-text="t('Upcoming Draws','መጪ ዕጣዎች')"></span>
            <span class="badge-count" x-text="member.upcoming.length"></span>
          </div>
          <template x-for="w in member.upcoming" :key="w.week_number">
            <div class="week-row">
              <div class="week-num wn-pending">W<span x-text="w.week_number"></span></div>
              <div class="week-info">
                <div class="week-title" style="display:flex;align-items:center;gap:6px">
                  <span x-text="t('Week','ሳምንት')"></span> <span x-text="w.week_number"></span>
                  <span x-show="w.is_group_week"
                        style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;background:#f3e8ff;color:#7c3aed;border:1px solid #e9d5ff"
                        x-text="t('Group','ቡድን')"></span>
                </div>
                <div class="week-date" x-text="fmtDate(w.draw_date)"></div>
              </div>
              <span class="status-pill sp-upcoming" x-text="t('Upcoming','መጪ')"></span>
            </div>
          </template>
        </div>

        <!-- Payment history -->
        <div class="section-card">
          <div class="section-header">
            <svg style="width:15px;height:15px;color:#6b7280" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
            <span class="section-title" x-text="t('Payment History','የክፍያ ታሪክ')"></span>
            <span class="badge-count" x-text="member.payments.length + ' ' + t('wks','ሳምን')"></span>
          </div>
          <div class="history-scroll">
            <template x-for="p in member.payments.slice().reverse()" :key="p.week_number">
              <div :style="!p.is_past && p.status==='pending' ? 'opacity:.4' : ''">
                <div class="week-row">
                  <div class="week-num"
                       :class="{'wn-paid':p.status==='paid','wn-missed':p.status==='missed','wn-late':p.status==='late','wn-partial':p.status==='partial','wn-pending':p.status==='pending'&&p.is_past,'wn-future':p.status==='pending'&&!p.is_past}">
                    <span x-text="p.week_number"></span>
                  </div>
                  <div class="week-info">
                    <div class="week-title"><span x-text="t('Week','ሳምንት')"></span> <span x-text="p.week_number"></span></div>
                    <div class="week-date" x-text="fmtDate(p.draw_date)"></div>
                    <div x-show="p.paid_date" class="week-paid-date">
                      <span x-text="t('Paid','ተከፍሏል')"></span> <span x-text="fmtDate(p.paid_date)"></span>
                      <span x-show="p.payment_method" x-text="' · ' + p.payment_method"></span>
                    </div>
                    <!-- Partial detail -->
                    <template x-if="p.status === 'partial' && p.paid_amount">
                      <div style="font-size:11px;color:#d97706;margin-top:2px">
                        <span x-text="t('Paid:','ተከፍሏል:') + ' ' + fmt(p.paid_amount)"></span>
                        <span style="margin-left:4px;color:#dc2626" x-text="'· ' + t('Due:','ቀሪ:') + ' ' + fmt(p.remaining_amount)"></span>
                      </div>
                    </template>
                  </div>
                  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0">
                    <span style="font-family:var(--font-display);font-size:.95rem;color:var(--gold)" x-text="fmt(p.amount)"></span>
                    <span class="status-pill"
                          :class="'sp-' + p.status"
                          x-text="p.status ? p.status.charAt(0).toUpperCase() + p.status.slice(1) : ''"></span>
                  </div>
                </div>
                <!-- Print receipt -->
                <div x-show="p.status === 'paid' || p.status === 'partial'" style="padding:0 18px 10px">
                  <a :href="'/api/portal/payments/' + p.id + '/receipt?phone=' + encodeURIComponent(phone) + '&spot_number=' + encodeURIComponent(spotNumber) + '&print=1'"
                     target="_blank" class="receipt-btn">
                    <svg style="width:13px;height:13px" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/>
                    </svg>
                    <span x-text="t('Print Receipt','ደረሰኝ አትም')"></span>
                  </a>
                </div>
              </div>
            </template>
            <div x-show="!member.payments.length" class="empty-history">
              <svg style="width:32px;height:32px;color:#d1d5db" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
              </svg>
              <span x-text="t('No payment records in the active cycle.','ምንም ክፍያ አልተገኘም።')"></span>
            </div>
          </div>
        </div>

        <!-- Admin contact -->
        <div x-show="member.admin_contact" class="section-card">
          <div class="contact-card">
            <div class="contact-label" x-text="t('Need help? Contact your admin','እርዳታ ይፈልጋሉ? አስተዳዳሪን ያናግሩ')"></div>
            <div class="contact-btns">
              <a :href="'tel:' + member.admin_contact" class="contact-btn green">
                <svg style="width:15px;height:15px" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                </svg>
                <span x-text="t('Call','ደውሉ')"></span>
              </a>
              <a :href="'https://wa.me/' + waNumber(member.admin_contact)" target="_blank" class="contact-btn wa">

<script>
function portal() {
  return {
    phone: '', spotNumber: '', loading: false, error: '', member: null,
    lang: 'en', shareToast: false,

    async init() {},

    t(en, am) { return this.lang === 'am' ? am : en; },

    signOut() { this.member = null; this.phone = ''; this.spotNumber = ''; this.error = ''; },

    async lookup() {
      const p = this.phone.trim(), s = String(this.spotNumber).trim();
      if (!p || !s) return;
      this.loading = true; this.error = ''; this.member = null;
      try {
        const res = await fetch('/api/portal/lookup?phone=' + encodeURIComponent(p) + '&spot_number=' + encodeURIComponent(s));
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          this.error = body.detail || this.t('No member found with this phone number and spot number.','በዚህ ስልክ ቁጥር እና ዕጣ ቁጥር ምንም አባል አልተገኘም።');
          return;
        }
        this.member = await res.json();
      } catch { this.error = this.t('Network error — please try again.','የአውታረ መረብ ስህተት — እንደገና ይሞክሩ።'); }
      finally { this.loading = false; }
    },

    async shareStatus() {
      if (!this.member) return;
      const m = this.member;
      const spots = m.spots.map(s => '#' + s.number + (s.share === 'half' ? '½' : '')).join(', ');
      const standing = m.summary.outstanding_count > 0 ? '⚠ Has overdue' : '✅ Good standing';
      const text = [
        `My Equb Status — ${m.cycle_name || 'Equb'}`,
        `Name: ${m.member_name}  |  Spot: ${spots}`,
        standing,
        `Paid: ${m.summary.paid_weeks} weeks  |  Total: ${this.fmtShort(m.summary.total_paid_amount)}`,
        m.pot_week ? `🗓 Pot scheduled: Week ${m.pot_week.week_number} (${this.fmtDate(m.pot_week.draw_date)})` : '',
      ].filter(Boolean).join('\n');
      if (navigator.share) { try { await navigator.share({ text }); return; } catch {} }
      try {
        await navigator.clipboard.writeText(text);
        this.shareToast = true;
        setTimeout(() => this.shareToast = false, 2500);
      } catch {}
    },

    waNumber(phone) {
      if (!phone) return '';
      let p = phone.replace(/\s/g, '');
      if (p.startsWith('+')) p = p.slice(1);
      else if (p.startsWith('0')) p = '251' + p.slice(1);
      return p;
    },

    fmt(n) {
      if (n == null) return '—';
      return Number(n).toLocaleString('en-ET', {minimumFractionDigits:0, maximumFractionDigits:0}) + ' ETB';
    },
    fmtShort(n) {
      if (n == null) return '—';
      const v = Number(n);
      if (v >= 1_000_000) return (v/1_000_000).toFixed(v%1_000_000===0?0:1) + 'M ETB';
      if (v >= 1_000)     return (v/1_000).toFixed(v%1_000===0?0:1) + 'K ETB';
      return v.toLocaleString('en-ET') + ' ETB';
    },
    fmtDate(d) {
      if (!d) return '—';
      try { return new Date(d).toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'}); }
      catch { return d; }
    },
  };
}
</script>

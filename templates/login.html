<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Equb Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            equb: { green:'#078930', yellow:'#FCDD09', red:'#DA121A', dark:'#030c06' }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            ethiopic: ['"Noto Sans Ethiopic"', 'sans-serif'],
          },
        }
      }
    }
  </script>

  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; margin: 0; min-height: 100vh; }
    .amharic { font-family: 'Noto Sans Ethiopic', sans-serif; }

    /* ── Brand panel (left) ── */
    .brand-panel {
      background: linear-gradient(145deg, #030c06 0%, #061510 50%, #030c06 100%);
      position: relative; overflow: hidden;
    }
    .brand-panel::before {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(7,137,48,0.15) 1px, transparent 1px);
      background-size: 32px 32px;
    }
    .brand-panel::after {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(7,137,48,0.3) 0%, transparent 55%),
        radial-gradient(ellipse at 75% 80%, rgba(7,137,48,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 50%, rgba(252,221,9,0.04) 0%, transparent 40%);
    }

    /* Floating rings */
    .ring {
      position: absolute; border-radius: 50%;
      border: 1px solid rgba(7,137,48,0.2);
      animation: ring-pulse 6s ease-in-out infinite;
    }
    @keyframes ring-pulse {
      0%,100% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.05); opacity: 0.7; }
    }

    /* ── Form panel (right) ── */
    .form-panel {
      background: #f8fafc;
      position: relative;
    }
    .form-panel::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 80% 10%, rgba(7,137,48,0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 20% 90%, rgba(7,137,48,0.04) 0%, transparent 40%);
      pointer-events: none;
    }

    /* ── Form card ── */
    .form-card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.09), 0 2px 8px rgba(0,0,0,0.05);
      border: 1px solid rgba(0,0,0,0.06);
    }

    /* ── Inputs ── */
    .field {
      width: 100%; padding: 12px 14px 12px 44px;
      border: 1.5px solid #e9ecef; border-radius: 14px;
      font-size: 0.875rem; background: #f8fafc; color: #111827;
      font-family: inherit;
      transition: border-color .15s, box-shadow .15s, background .15s;
    }
    .field:focus {
      outline: none; border-color: #078930; background: #fff;
      box-shadow: 0 0 0 4px rgba(7,137,48,0.1);
    }
    .field.error { border-color: #ef4444; background: #fff5f5; }
    .field.error:focus { box-shadow: 0 0 0 4px rgba(239,68,68,0.1); }
    .field::placeholder { color: #adb5bd; }

    /* ── Sign in button ── */
    .btn-signin {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #078930 0%, #0aad3e 100%);
      color: #fff; font-weight: 700; font-size: 0.9375rem;
      border-radius: 14px; border: none; cursor: pointer;
      letter-spacing: 0.01em;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(7,137,48,0.35);
      position: relative; overflow: hidden;
    }
    .btn-signin::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(rgba(255,255,255,0.1), transparent);
    }
    .btn-signin:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(7,137,48,0.45); }
    .btn-signin:active { transform: translateY(0); }
    .btn-signin:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* ── Feature list ── */
    .feature-item {
      display: flex; align-items: center; gap: 12px;
      color: rgba(255,255,255,0.75); font-size: 0.875rem;
    }
    .feature-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #14e050; flex-shrink: 0;
      box-shadow: 0 0 8px rgba(20,224,80,0.6);
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .brand-panel { display: none; }
      .form-panel { width: 100%; }
    }
  </style>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>

<body x-data="loginPage()">

<div class="flex min-h-screen">

  <!-- ── Left: Brand panel ──────────────────────────────────────────────── -->
  <div class="brand-panel hidden md:flex md:w-5/12 lg:w-1/2 flex-col justify-between p-10 relative z-10">

    <!-- Ethiopian flag stripe on left edge -->
    <div class="absolute left-0 top-0 h-full w-1.5 flex flex-col">
      <div class="flex-1" style="background:#078930"></div>
      <div class="flex-1" style="background:#FCDD09"></div>
      <div class="flex-1" style="background:#DA121A"></div>
    </div>

    <!-- Decorative rings -->
    <div class="ring" style="width:340px;height:340px;top:-80px;left:-80px;animation-delay:0s"></div>
    <div class="ring" style="width:220px;height:220px;bottom:80px;right:-60px;animation-delay:-2s"></div>
    <div class="ring" style="width:140px;height:140px;top:40%;left:60%;animation-delay:-4s"></div>

    <!-- Top logo mark -->
    <div class="relative z-10">
      <div class="flex items-center gap-3">
        <div class="w-11 h-11 rounded-2xl overflow-hidden shadow-lg"
             style="background:linear-gradient(135deg,#078930 33%,#FCDD09 33% 66%,#DA121A 66%)"></div>
        <div>
          <div class="text-green-400 text-xs font-semibold tracking-widest uppercase">ETHIOPIA</div>
          <div class="text-white/70 text-xs">Equb Management System</div>
        </div>
      </div>
    </div>

    <!-- Main brand content -->
    <div class="relative z-10 py-8">
      <!-- Large title -->
      <h1 class="amharic font-black text-white leading-none mb-4"
          style="font-size: clamp(3.5rem, 8vw, 6rem);">እቁብ</h1>
      <p class="text-green-300/80 text-lg font-medium mb-10">Smart savings, together</p>

      <!-- Feature list -->
      <div class="space-y-4">
        <div class="feature-item">
          <div class="feature-dot"></div>
          <span>Weekly draw management</span>
        </div>
        <div class="feature-item">
          <div class="feature-dot" style="animation-delay:0.3s"></div>
          <span>Payment tracking</span>
        </div>
        <div class="feature-item">
          <div class="feature-dot" style="animation-delay:0.6s"></div>
          <span>Reports &amp; accounting</span>
        </div>
      </div>
    </div>

    <!-- Bottom accent bar -->
    <div class="relative z-10">
      <div class="h-px mb-6" style="background:linear-gradient(90deg,transparent,rgba(7,137,48,0.4),transparent)"></div>
      <div class="flex items-center gap-2">
        <div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
        <span class="text-green-400/50 text-xs font-medium">Secure connection</span>
      </div>
    </div>
  </div>

  <!-- ── Right: Form panel ──────────────────────────────────────────────── -->
  <div class="form-panel flex-1 flex flex-col">

    <!-- Top bar: mobile flag stripe -->
    <div class="flex items-center px-8 pt-6">
      <div class="flex gap-1 md:hidden">
        <div class="w-6 h-1.5 rounded-full" style="background:#078930"></div>
        <div class="w-6 h-1.5 rounded-full" style="background:#FCDD09"></div>
        <div class="w-6 h-1.5 rounded-full" style="background:#DA121A"></div>
      </div>
    </div>

    <!-- Form centered -->
    <div class="flex-1 flex items-center justify-center px-6 py-8">
      <div class="w-full max-w-sm">

        <!-- Mobile branding -->
        <div class="md:hidden text-center mb-8">
          <div class="inline-flex w-14 h-14 rounded-2xl shadow-lg mb-3 overflow-hidden"
               style="background:linear-gradient(135deg,#078930 33%,#FCDD09 33% 66%,#DA121A 66%)"></div>
          <h1 class="amharic text-3xl font-black text-gray-900">እቁብ</h1>
        </div>

        <!-- Form card -->
        <div class="form-card px-8 py-8">

          <!-- Header -->
          <div class="mb-8">
            <h2 class="text-2xl font-bold text-gray-900 leading-tight">Welcome back</h2>
            <p class="text-gray-400 text-sm mt-1.5">Sign in to your account</p>
          </div>

          <!-- Error / lockout -->
          {% if error %}
          <div class="mb-6 flex items-start gap-3 rounded-2xl px-4 py-3.5 text-sm
                      {% if locked %}bg-orange-50 border border-orange-200 text-orange-700
                      {% else %}bg-red-50 border border-red-200 text-red-700{% endif %}">
            <svg class="w-4 h-4 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              {% if locked %}
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
              {% else %}
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
              {% endif %}
            </svg>
            <span>{{ error }}</span>
          </div>
          {% endif %}

          <!-- Form -->
          <form method="post" action="/login" @submit="submitting = true" class="space-y-5">

            <!-- Username -->
            <div>
              <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Username</label>
              <div class="relative">
                <div class="absolute inset-y-0 left-3.5 flex items-center pointer-events-none">
                  <svg style="width:18px;height:18px" class="text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75"
                      d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                  </svg>
                </div>
                <input name="username" type="text" required autocomplete="username"
                       class="field {% if error and not locked %}error{% endif %}"
                       placeholder="Enter username" autofocus/>
              </div>
            </div>

            <!-- Password -->
            <div>
              <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Password</label>
              <div class="relative">
                <div class="absolute inset-y-0 left-3.5 flex items-center pointer-events-none">
                  <svg style="width:18px;height:18px" class="text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75"
                      d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                  </svg>
                </div>
                <input name="password" :type="showPwd ? 'text' : 'password'" required
                       autocomplete="current-password"
                       class="field pr-12 {% if error and not locked %}error{% endif %}"
                       placeholder="Enter password"/>
                <button type="button" @click="showPwd = !showPwd"
                        class="absolute inset-y-0 right-3 flex items-center text-gray-300 hover:text-gray-500 transition-colors px-1">
                  <svg x-show="!showPwd" style="width:18px;height:18px" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75"
                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                  </svg>
                  <svg x-show="showPwd" style="width:18px;height:18px" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75"
                      d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                  </svg>
                </button>
              </div>
            </div>

            <button type="submit"
                    class="btn-signin mt-2"
                    :disabled="submitting{% if locked %} || true{% endif %}"
                    x-text="submitting ? 'Signing in…' : 'Sign In'">
            </button>
          </form>
        </div>

        <!-- Footer hint -->
        <div class="mt-5 flex items-center justify-between px-1">
          <div class="flex items-center gap-1.5">
            <div class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div>
            <span class="text-xs text-gray-400">Secure connection</span>
          </div>
          <span class="text-xs text-gray-300">v2.0</span>
        </div>
      </div>
    </div>

    <!-- Ethiopian flag bottom stripe on form panel -->
    <div class="flex h-1">
      <div class="flex-1" style="background:#078930"></div>
      <div class="flex-1" style="background:#FCDD09"></div>
      <div class="flex-1" style="background:#DA121A"></div>
    </div>
  </div>
</div>

<script>
function loginPage() {
  return {
    showPwd: false,
    submitting: false,
  };
}
</script>
</body>
</html>

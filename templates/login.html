<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Equb Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            equb: { green:'#078930', yellow:'#FCDD09', red:'#DA121A', dark:'#071A10', mid:'#1a3d2b', light:'#2d6a4f' }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            ethiopic: ['"Noto Sans Ethiopic"', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .amharic { font-family: 'Noto Sans Ethiopic', sans-serif; }
    .flag-stripe {
      background: linear-gradient(to right, #078930 33.3%, #FCDD09 33.3% 66.6%, #DA121A 66.6%);
    }
    input:focus { outline: none; box-shadow: 0 0 0 3px rgba(7,137,48,0.2); border-color: #078930; }
    input { transition: border-color 0.15s, box-shadow 0.15s; }
  </style>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-equb-dark"
      style="background: radial-gradient(ellipse at 30% 20%, #0f3020 0%, #071A10 60%);">

  <!-- Decorative blobs -->
  <div class="fixed top-0 left-0 w-full h-full overflow-hidden pointer-events-none" aria-hidden="true">
    <div class="absolute -top-32 -left-32 w-96 h-96 rounded-full opacity-10" style="background: #078930; filter: blur(80px);"></div>
    <div class="absolute -bottom-32 -right-32 w-80 h-80 rounded-full opacity-10" style="background: #FCDD09; filter: blur(80px);"></div>
    <div class="absolute top-1/2 right-20 w-64 h-64 rounded-full opacity-5" style="background: #DA121A; filter: blur(60px);"></div>
  </div>

  <div class="w-full max-w-sm mx-4 relative z-10" x-data="loginForm()">
    <!-- Card -->
    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">

      <!-- Ethiopian flag stripe at top -->
      <div class="flag-stripe h-1.5"></div>

      <!-- Card content -->
      <div class="px-8 py-8">
        <!-- Logo / Branding -->
        <div class="text-center mb-8">
          <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4 overflow-hidden shadow-lg"
               style="background: linear-gradient(135deg, #078930 33%, #FCDD09 33% 66%, #DA121A 66%)">
          </div>
          <h1 class="text-3xl font-bold text-gray-900 amharic leading-tight">እቁብ</h1>
          <p class="text-sm text-gray-500 mt-1 font-medium">Equb Management System</p>
        </div>

        <!-- Error message -->
        {% if error %}
        <div class="mb-5 flex items-center gap-2.5 bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 text-sm">
          <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          {{ error }}
        </div>
        {% endif %}

        <!-- Login form -->
        <form method="post" action="/login" class="space-y-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Username</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none">
                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
              </div>
              <input name="username" type="text" required autocomplete="username"
                     class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-xl text-sm text-gray-900 bg-gray-50 placeholder-gray-400"
                     placeholder="Enter your username"/>
            </div>
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Password</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none">
                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
              </div>
              <input name="password" :type="showPwd ? 'text' : 'password'" required autocomplete="current-password"
                     class="w-full pl-10 pr-10 py-2.5 border border-gray-200 rounded-xl text-sm text-gray-900 bg-gray-50 placeholder-gray-400"
                     placeholder="Enter your password"/>
              <button type="button" @click="showPwd = !showPwd"
                      class="absolute inset-y-0 right-3 flex items-center text-gray-400 hover:text-gray-600">
                <svg x-show="!showPwd" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
                <svg x-show="showPwd" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                </svg>
              </button>
            </div>
          </div>

          <button type="submit"
                  class="w-full py-2.5 bg-equb-green hover:bg-equb-light text-white font-semibold rounded-xl text-sm transition-colors duration-200 mt-2 shadow-sm"
                  style="background-color: #078930;">
            Sign In
          </button>
        </form>
      </div>

      <!-- Footer -->
      <div class="bg-gray-50 border-t border-gray-100 px-8 py-4">
        <p class="text-xs text-gray-400 text-center">Ethiopian Equb Management System</p>
      </div>
    </div>

    <p class="text-center text-green-600 text-xs mt-6 opacity-60">
      Default: admin / admin123 &nbsp;·&nbsp; cashier / cashier123
    </p>
  </div>

  <script>
    function loginForm() {
      return { showPwd: false };
    }
  </script>
</body>
</html>

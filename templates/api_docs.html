{% extends "base.html" %}
{% block title %}API Docs — {{ group_name }}{% endblock %}
{% block nav_api_docs %}active{% endblock %}

{% block content %}
<div x-data="apiDocs()" x-init="init()" x-cloak>
<div class="p-8 space-y-6">

  <!-- Header -->
  <div class="flex items-center justify-between flex-wrap gap-3">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">API Documentation</h1>
      <p class="text-sm text-gray-500 mt-0.5">
        <span x-text="spec.info?.title || 'Equb Management System'"></span>
        <span class="mx-1.5 text-gray-300">·</span>
        <span class="font-mono text-xs" x-text="'v' + (spec.info?.version || '0.1.0')"></span>
        <span class="mx-1.5 text-gray-300">·</span>
        <span x-text="totalEndpoints + ' endpoints'"></span>
      </p>
    </div>
    <div class="flex items-center gap-2">
      <!-- Search -->
      <input x-model="search" type="text" placeholder="Search endpoints…"
             class="w-56 text-sm" style="border-radius:12px;padding:8px 14px"/>
      <!-- Tag filter -->
      <select x-model="activeTag" class="text-sm w-40">
        <option value="">All sections</option>
        <template x-for="tag in allTags" :key="tag">
          <option :value="tag" x-text="tag"></option>
        </template>
      </select>
      <a href="/openapi.json" target="_blank"
         class="btn-secondary text-xs flex items-center gap-1.5">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
        </svg>
        openapi.json
      </a>
    </div>
  </div>

  <!-- Skeleton -->
  <div x-show="loading" class="space-y-4">
    <template x-for="i in [1,2,3]" :key="i">
      <div class="card space-y-3">
        <div class="skeleton h-5 w-32 rounded-full"></div>
        <div class="space-y-2">
          <template x-for="j in [1,2,3]" :key="j">
            <div class="skeleton h-12 rounded-xl"></div>
          </template>
        </div>
      </div>
    </template>
  </div>

  <!-- Content -->
  <template x-if="!loading">
    <div class="space-y-6">
      <template x-for="group in filteredGroups" :key="group.tag">
        <div class="card space-y-3">
          <!-- Section header -->
          <div class="flex items-center justify-between cursor-pointer"
               @click="toggleTag(group.tag)">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-xl flex items-center justify-center"
                   :style="'background:' + tagColor(group.tag) + '22'">
                <span class="text-sm font-bold" :style="'color:' + tagColor(group.tag)"
                      x-text="group.tag[0].toUpperCase()"></span>
              </div>
              <div>
                <h2 class="font-semibold text-gray-800 capitalize" x-text="group.tag"></h2>
                <p class="text-xs text-gray-400" x-text="group.endpoints.length + ' endpoints'"></p>
              </div>
            </div>
            <svg class="w-4 h-4 text-gray-400 transition-transform duration-200"
                 :class="collapsed[group.tag] ? 'rotate-180' : ''"
                 fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/>
            </svg>
          </div>

          <!-- Endpoints list -->
          <div x-show="!collapsed[group.tag]" class="space-y-2">
            <template x-for="ep in group.endpoints" :key="ep.method + ep.path">
              <div class="rounded-xl border overflow-hidden"
                   style="border-color: var(--c-border)">
                <!-- Endpoint row -->
                <div class="flex items-center gap-3 px-4 py-3 cursor-pointer hover:bg-gray-50 transition-colors"
                     @click="toggleEndpoint(ep.method + ep.path)">
                  <!-- Method badge -->
                  <span class="text-xs font-bold px-2.5 py-1 rounded-lg min-w-[52px] text-center flex-shrink-0"
                        :class="methodClass(ep.method)"
                        x-text="ep.method.toUpperCase()"></span>
                  <!-- Path -->
                  <code class="text-sm font-mono text-gray-700 flex-1 truncate" x-text="ep.path"></code>
                  <!-- Summary -->
                  <span class="text-xs text-gray-400 hidden sm:block truncate max-w-[200px]"
                        x-text="ep.summary"></span>
                  <!-- Auth badge -->
                  <span x-show="ep.secured"
                        class="text-xs px-2 py-0.5 rounded-full flex-shrink-0"
                        style="background:rgba(234,179,8,0.12);color:#ca8a04;border:1px solid rgba(234,179,8,0.2)">
                    🔒 auth
                  </span>
                  <svg class="w-4 h-4 text-gray-300 flex-shrink-0 transition-transform"
                       :class="openEndpoints[ep.method + ep.path] ? 'rotate-180' : ''"
                       fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                  </svg>
                </div>

                <!-- Expanded detail -->
                <div x-show="openEndpoints[ep.method + ep.path]"
                     class="border-t px-4 py-4 space-y-4 text-sm"
                     style="border-color:var(--c-border);background:var(--bg-page)">

                  <!-- Description -->
                  <p x-show="ep.description" class="text-gray-500 text-xs leading-relaxed" x-text="ep.description"></p>

                  <!-- Parameters -->
                  <template x-if="ep.parameters && ep.parameters.length">
                    <div>
                      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Parameters</p>
                      <div class="space-y-1.5">
                        <template x-for="param in ep.parameters" :key="param.name">
                          <div class="flex items-start gap-3 p-2.5 rounded-lg"
                               style="background:var(--bg-card)">
                            <code class="text-xs font-mono text-equb-green font-semibold flex-shrink-0"
                                  x-text="param.name"></code>
                            <span class="text-xs px-1.5 py-0.5 rounded flex-shrink-0"
                                  :class="param.required ? 'bg-red-100 text-red-600' : 'bg-gray-100 text-gray-500'"
                                  x-text="param.required ? 'required' : 'optional'"></span>
                            <span class="text-xs text-gray-400 font-mono" x-text="param.schema?.type || 'any'"></span>
                            <span class="text-xs text-gray-400 flex-1" x-text="param.description || ''"></span>
                          </div>
                        </template>
                      </div>
                    </div>
                  </template>

                  <!-- Request body -->
                  <template x-if="ep.requestBody">
                    <div>
                      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Request Body</p>
                      <pre class="text-xs p-3 rounded-xl overflow-x-auto"
                           style="background:var(--bg-input);color:var(--c-text2);font-family:monospace"
                           x-text="JSON.stringify(ep.requestSchema, null, 2)"></pre>
                    </div>
                  </template>

                  <!-- Responses -->
                  <div>
                    <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Responses</p>
                    <div class="space-y-1.5">
                      <template x-for="(resp, code) in ep.responses" :key="code">
                        <div class="flex items-center gap-3 p-2.5 rounded-lg"
                             style="background:var(--bg-card)">
                          <span class="text-xs font-bold font-mono px-2 py-0.5 rounded-md flex-shrink-0"
                                :class="code.startsWith('2') ? 'bg-green-100 text-green-700' : code.startsWith('4') ? 'bg-amber-100 text-amber-700' : 'bg-red-100 text-red-700'"
                                x-text="code"></span>
                          <span class="text-xs text-gray-500" x-text="resp.description || ''"></span>
                        </div>
                      </template>
                    </div>
                  </div>

                  <!-- Copy curl -->
                  <div class="flex justify-end">
                    <button @click="copyCurl(ep)"
                            class="text-xs text-gray-400 hover:text-equb-green font-medium flex items-center gap-1.5 transition-colors">
                      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                      </svg>
                      Copy curl
                    </button>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </div>
      </template>

      <!-- Empty state -->
      <div x-show="filteredGroups.length === 0"
           class="card text-center py-12">
        <div class="text-gray-400 text-4xl mb-3">🔍</div>
        <p class="text-gray-500 font-medium">No endpoints match your search</p>
        <button @click="search=''; activeTag=''" class="btn-secondary text-xs mt-4">Clear filters</button>
      </div>
    </div>
  </template>

</div>
</div>
{% endblock %}

{% block scripts %}
<script>
function apiDocs() {
  return {
    spec: {},
    loading: true,
    search: '',
    activeTag: '',
    collapsed: {},
    openEndpoints: {},

    get allTags() {
      if (!this.spec.paths) return [];
      const tags = new Set();
      Object.values(this.spec.paths).forEach(methods =>
        Object.values(methods).forEach(op => (op.tags || []).forEach(t => tags.add(t)))
      );
      return [...tags].sort();
    },

    get totalEndpoints() {
      if (!this.spec.paths) return 0;
      return Object.values(this.spec.paths)
        .reduce((n, m) => n + Object.keys(m).filter(k => ['get','post','put','delete','patch'].includes(k)).length, 0);
    },

    get groups() {
      if (!this.spec.paths) return [];
      const map = {};
      Object.entries(this.spec.paths).forEach(([path, methods]) => {
        Object.entries(methods).forEach(([method, op]) => {
          if (!['get','post','put','delete','patch'].includes(method)) return;
          const tag = (op.tags || ['other'])[0];
          if (!map[tag]) map[tag] = [];
          const body = op.requestBody;
          let requestSchema = null;
          if (body) {
            const content = body.content || {};
            const jsonContent = content['application/json'];
            if (jsonContent?.schema) {
              requestSchema = this._resolveSchema(jsonContent.schema);
            }
          }
          map[tag].push({
            method,
            path,
            summary: op.summary || '',
            description: op.description || '',
            parameters: (op.parameters || []),
            requestBody: !!body,
            requestSchema,
            responses: op.responses || {},
            secured: !!(op.security && op.security.length),
          });
        });
      });
      return Object.entries(map)
        .map(([tag, endpoints]) => ({ tag, endpoints }))
        .sort((a, b) => a.tag.localeCompare(b.tag));
    },

    get filteredGroups() {
      const q = this.search.toLowerCase().trim();
      return this.groups
        .filter(g => !this.activeTag || g.tag === this.activeTag)
        .map(g => ({
          ...g,
          endpoints: g.endpoints.filter(ep =>
            !q ||
            ep.path.toLowerCase().includes(q) ||
            ep.summary.toLowerCase().includes(q) ||
            ep.method.toLowerCase().includes(q)
          ),
        }))
        .filter(g => g.endpoints.length > 0);
    },

    _resolveSchema(schema) {
      if (!schema) return null;
      if (schema.$ref) {
        const name = schema.$ref.split('/').pop();
        return this.spec.components?.schemas?.[name] || { $ref: schema.$ref };
      }
      return schema;
    },

    async init() {
      try {
        this.spec = await fetch('/openapi.json').then(r => r.json());
      } catch(e) {
        this.showToast('Failed to load API spec', 'error');
      } finally {
        this.loading = false;
      }
    },

    toggleTag(tag) {
      this.collapsed[tag] = !this.collapsed[tag];
    },

    toggleEndpoint(key) {
      this.openEndpoints[key] = !this.openEndpoints[key];
    },

    methodClass(method) {
      return {
        get:    'bg-blue-100 text-blue-700',
        post:   'bg-green-100 text-green-700',
        put:    'bg-amber-100 text-amber-700',
        patch:  'bg-orange-100 text-orange-700',
        delete: 'bg-red-100 text-red-700',
      }[method] || 'bg-gray-100 text-gray-600';
    },

    tagColor(tag) {
      const colors = ['#078930','#0ea5e9','#8b5cf6','#f59e0b','#ef4444','#ec4899','#14b8a6','#f97316'];
      let h = 0;
      for (const c of tag) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
      return colors[Math.abs(h) % colors.length];
    },

    copyCurl(ep) {
      const base = window.location.origin;
      const curl = `curl -X ${ep.method.toUpperCase()} "${base}${ep.path}" \\\n  -H "Cookie: session=YOUR_SESSION_COOKIE"`;
      navigator.clipboard.writeText(curl).then(() => this.showToast('curl copied'));
    },
  };
}
</script>
{% endblock %}
